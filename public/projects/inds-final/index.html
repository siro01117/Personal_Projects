<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>인디사 기말 · 7~11장</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  :root{
    --ink:#16161f; --body:#33333d; --mut:#5c5c6a;   /* mut = 보조 텍스트 (대비 4.5:1+) */
    --mute:#9aa0ab;                                   /* mute = 얇은 선·faint 아이콘 전용 */
    --line:#ececf2; --line2:#dcdce5;
    --ind:#5b5bd6; --ind-deep:#403bc0; --ind-soft:#eeeefb; --ind-soft2:#f6f6fd;
    --ok:#15803d; --ok-soft:#eafaf0; --bad:#c0344a; --bad-soft:#fdeef1;
    --warn:#8a5210; --warn-soft:#fff7ec;
    --paper:#fff; --bg:#eaeaee; --code-bg:#f4f5f9; --hl:#fde68a;
    --s:8px;
  }
  html,body{background:var(--bg);color:var(--body);font-family:'Noto Sans KR',sans-serif;
    line-height:1.75;-webkit-font-smoothing:antialiased;font-size:15px;letter-spacing:-.003em;overscroll-behavior-y:contain}
  body{display:flex;justify-content:center;overflow-x:clip}
  .app{width:100%;max-width:880px;min-height:100vh;background:var(--paper);box-shadow:0 0 70px rgba(20,20,40,.07);position:relative}
  b{font-weight:700;color:var(--ink)} .ind{color:var(--ind);font-weight:700}
  .hl{background:linear-gradient(180deg,transparent 58%,var(--hl) 58%);padding:0 3px;font-weight:700;color:var(--ink)}
  code{font-family:'JetBrains Mono',monospace;font-size:.86em;background:var(--code-bg);color:#3a3a52;padding:2px 6px;border-radius:4px;border:1px solid #e7e7f0}
  svg.ic{width:1em;height:1em;vertical-align:-.14em;stroke:currentColor;stroke-width:2;fill:none;stroke-linecap:round;stroke-linejoin:round}

  .top{position:sticky;top:0;z-index:30;background:rgba(255,255,255,.94);backdrop-filter:blur(8px);
    border-bottom:1px solid var(--line);display:flex;align-items:center;gap:12px;padding:13px 22px}
  .top .hb{display:flex;align-items:center;gap:6px;cursor:pointer;font-weight:700;color:var(--ink);font-size:14px;background:none;border:none}
  .top .hb:hover{color:var(--ind)}
  .top .crumb{font-size:12.5px;color:var(--mut);font-weight:500}
  .top .bar{flex:1;height:5px;background:var(--line);border-radius:3px;overflow:hidden;max-width:160px;margin-left:auto}
  .top .bar i{display:block;height:100%;background:var(--ind);width:0;transition:width .4s ease}
  .top .pct{font-size:12px;color:var(--mut);font-family:'JetBrains Mono',monospace;min-width:42px;text-align:right}

  /* ===== HOME ===== */
  .home{padding:36px 26px 64px}
  .home .kick{color:var(--ind);font-weight:700;font-size:12.5px;letter-spacing:.3px;margin-bottom:10px}
  .home h1{font-size:34px;font-weight:900;color:var(--ink);line-height:1.18;letter-spacing:-1px;margin-bottom:14px}
  .home .lead{font-size:14px;color:var(--mut);font-weight:500;line-height:1.85;margin-bottom:26px}
  .spine{background:var(--ind-soft2);border:1px solid var(--line);border-radius:14px;padding:18px 20px;margin-bottom:30px}
  .spine .sl{font-size:11px;font-weight:700;letter-spacing:.6px;color:var(--ind);margin-bottom:12px;text-transform:uppercase}
  .spine .flow{display:flex;flex-wrap:wrap;align-items:center;gap:8px;font-size:13px;color:var(--body);font-weight:700}
  .spine .flow .st{background:#fff;border:1px solid var(--line2);border-radius:8px;padding:7px 12px}
  .spine .flow .ar{color:var(--ind);font-weight:900}
  .spine .note{font-size:12px;color:var(--mut);margin-top:12px;line-height:1.6}
  .spine .usage{list-style:none;margin:2px 0 0}
  .spine .usage li{position:relative;padding:5px 0 5px 17px;font-size:12.8px;color:var(--mut);line-height:1.75}
  .spine .usage li::before{content:"";position:absolute;left:2px;top:13px;width:5px;height:5px;border-radius:50%;background:var(--ind)}
  .spine .usage li b{color:var(--ink)} .spine .usage .ar{color:var(--ind);font-weight:900}

  .mx{width:100%;border-collapse:separate;border-spacing:10px;margin-top:6px}
  .mx td.corner{width:1%}
  .mx th{font-size:18px;font-weight:900;color:var(--ind);font-family:'JetBrains Mono',monospace;padding:0 2px 12px;text-align:center;vertical-align:bottom}
  .mx td.rowlab{width:1%;padding:0 9px 0 2px;text-align:center;vertical-align:middle}
  .mx td.rowlab .lvic{display:block;margin:0 auto 4px}.mx td.rowlab .lvic svg{width:20px;height:20px;stroke:var(--mut);stroke-width:1.8;fill:none}
  .mx td.rowlab .ln{color:var(--body);font-family:'JetBrains Mono',monospace;font-size:15px;font-weight:900}
  .cell{--ac:#5b5bd6;width:100%;height:56px;border:2px solid color-mix(in srgb,var(--ac) 34%,#fff);background:#fff;border-radius:9px;cursor:pointer;display:grid;place-items:center;transition:.16s;padding:0}
  .cell.lvl1{background:color-mix(in srgb,var(--ac) 7%,#fff);border-color:color-mix(in srgb,var(--ac) 34%,#fff)}
  .cell.lvl2{background:color-mix(in srgb,var(--ac) 13%,#fff);border-color:color-mix(in srgb,var(--ac) 44%,#fff)}
  .cell.lvl3{background:color-mix(in srgb,var(--ac) 20%,#fff);border-color:color-mix(in srgb,var(--ac) 55%,#fff)}
  .cell.lvl4{background:color-mix(in srgb,var(--ac) 30%,#fff);border-color:color-mix(in srgb,var(--ac) 67%,#fff)}
  .cell.lvl5{background:color-mix(in srgb,var(--ac) 42%,#fff);border-color:color-mix(in srgb,var(--ac) 80%,#fff)}
  .cell:hover{border-color:var(--ac);transform:translateY(-2px);box-shadow:0 6px 16px color-mix(in srgb,var(--ac) 26%,transparent)}
  .cell .cdot svg{width:24px;height:24px;stroke:var(--ok);stroke-width:2.6;fill:none}
  .cell.done{background:var(--ok-soft);border-color:var(--ok)}
  .legend{display:flex;flex-wrap:wrap;gap:5px 14px;justify-content:center;margin-top:18px;font-size:11.5px;color:var(--mut)}
  .legend b{color:var(--ink)} .legend span{white-space:nowrap}
  .home .hint{font-size:12px;color:var(--mut);margin-top:22px;line-height:1.7;text-align:center}
  .reset{margin-top:24px;text-align:center}
  .reset button{background:none;border:none;color:var(--mute);font-size:12px;cursor:pointer;text-decoration:underline;font-family:inherit}
  .reset button:hover{color:var(--bad)}

  /* ===== CELL VIEW (읽기 열은 좁게 유지) ===== */
  .view{display:none;max-width:760px;margin:0 auto;padding:30px 26px 80px}
  .view.active{display:block}
  .view.slin{animation:slin .28s ease}.view.slout{animation:slout .28s ease}.view.up{animation:up .3s ease}
  @keyframes slin{from{opacity:0;transform:translateX(30px)}to{opacity:1;transform:none}}
  @keyframes slout{from{opacity:0;transform:translateX(-30px)}to{opacity:1;transform:none}}
  @keyframes up{from{opacity:0;transform:translateY(22px)}to{opacity:1;transform:none}}
  .vmeta{display:flex;align-items:center;gap:9px;flex-wrap:wrap;margin-bottom:7px}
  .vmeta .ch{color:var(--ind);font-weight:700;font-size:13px;display:inline-flex;align-items:center;gap:6px}
  .vmeta .ch svg{width:16px;height:16px;stroke:var(--ind);stroke-width:1.9;fill:none}
  .vmeta .sp{font-size:11px;color:var(--mut);background:var(--ind-soft2);border:1px solid var(--line);border-radius:20px;padding:3px 11px}
  .lvtag{display:inline-flex;align-items:center;gap:6px;font-size:11px;font-weight:700;letter-spacing:.3px;padding:4px 11px;border-radius:7px;margin-bottom:12px}
  .lvtag svg{width:14px;height:14px;stroke:currentColor;stroke-width:2;fill:none}
  .lv1{background:var(--ind-soft);color:var(--ind-deep)} .lv2{background:#e7f0fc;color:#2563eb}
  .lv3{background:var(--ok-soft);color:var(--ok)} .lv4{background:var(--warn-soft);color:var(--warn)} .lv5{background:#f1f1f5;color:#4b4b57}
  .vtitle{font-size:26px;font-weight:900;color:var(--ink);letter-spacing:-.6px;line-height:1.2;margin-bottom:22px}

  .read{font-size:15.5px;color:var(--body);line-height:2.0}
  .read p{margin:16px 0}.read p b{color:var(--ink)}
  .flow2{display:flex;flex-wrap:wrap;align-items:center;gap:9px;margin:6px 0 22px;padding:16px;background:var(--ind-soft2);border-radius:14px}
  .flow2 .c{background:#fff;border:1px solid var(--line2);border-radius:9px;padding:9px 13px;font-size:13px;font-weight:700;color:var(--ink);line-height:1.35}
  .flow2 .a{display:inline-flex;color:var(--ind)}.flow2 .a svg{width:17px;height:17px;stroke:var(--ind);stroke-width:2.2;fill:none}
  .read .ana{background:var(--ind-soft2);border-left:4px solid var(--ind);border-radius:0 10px 10px 0;padding:16px 18px;margin:18px 0;font-size:15px;line-height:1.95}
  .read table{width:100%;border-collapse:separate;border-spacing:0;margin:18px 0;font-size:13.5px;border:1px solid var(--line);border-radius:10px;overflow:hidden}
  .read th{text-align:left;padding:11px 14px;font-weight:700;color:var(--ink);font-size:12.5px;background:var(--ind-soft2);border-bottom:1px solid var(--line)}
  .read td{padding:11px 14px;border-bottom:1px solid var(--line);color:var(--body);vertical-align:top;line-height:1.6}
  .read tr:last-child td{border-bottom:none}.read td b{color:var(--ink)}

  .anim{margin:22px 0;border:1px solid var(--line2);border-radius:14px;padding:18px;background:#fcfcff}
  .anim .acap{font-size:11px;font-weight:700;letter-spacing:.6px;color:var(--ind);margin-bottom:13px;text-transform:uppercase}
  .anim .ctrls{display:flex;flex-wrap:wrap;gap:8px;margin:13px 0}
  .anim .ctrls button{font-family:inherit;font-size:12.5px;font-weight:700;cursor:pointer;border:1px solid var(--line2);background:#fff;color:var(--body);border-radius:8px;padding:8px 14px;transition:.15s}
  .anim .ctrls button:hover{border-color:var(--ind);color:var(--ind-deep)} .anim .ctrls button.on{background:var(--ind);border-color:var(--ind);color:#fff}
  .anim .rd{font-size:13.5px;color:var(--body);line-height:1.7;min-height:1.7em;margin-top:8px}.anim .rd b{color:var(--ind-deep)}
  .anim svg{display:block;width:100%;height:auto} .anim .big{font-family:'JetBrains Mono',monospace;font-weight:700;font-size:28px;color:var(--ink)}
  .anim .big.bad{color:var(--bad)}.anim .big.ok{color:var(--ok)}
  .anim pre{background:var(--code-bg);border:1px solid #e7e7f0;border-radius:8px;padding:13px 15px;font-family:'JetBrains Mono',monospace;font-size:12.6px;line-height:1.75;color:#33344a;overflow-x:auto}

  .items{margin-top:30px}
  .ihead{display:flex;align-items:center;gap:7px;font-size:12px;font-weight:700;letter-spacing:1px;color:var(--ink);border-top:2px solid var(--ink);padding-top:18px;margin-bottom:5px}
  .ihead svg{width:15px;height:15px;stroke:var(--ind);stroke-width:2;fill:none}
  .isub{font-size:12.5px;color:var(--mut);margin-bottom:22px;line-height:1.6}
  .item{margin-bottom:28px}
  .iq{font-size:15.5px;font-weight:700;color:var(--ink);line-height:1.65;margin-bottom:14px}
  .iq .qn{color:var(--ind);font-family:'JetBrains Mono',monospace;margin-right:8px;font-size:13.5px}
  .opts{display:flex;flex-direction:column;gap:10px}
  .opt{text-align:left;font-family:inherit;font-size:14.5px;color:var(--body);cursor:pointer;background:#fff;border:1.5px solid var(--line2);border-radius:11px;padding:13px 16px;transition:.14s;display:flex;gap:12px;align-items:flex-start;line-height:1.6}
  .opt:hover:not(:disabled){border-color:var(--ind);background:var(--ind-soft2)}
  .opt .mk{flex:0 0 21px;height:21px;border-radius:50%;border:1.5px solid var(--line2);display:grid;place-items:center;font-size:11px;font-weight:700;color:var(--mut);margin-top:1px}
  .opt.ok{border-color:var(--ok);background:var(--ok-soft);color:var(--ink)}.opt.ok .mk{border-color:var(--ok);background:var(--ok);color:#fff}
  .opt.bad{border-color:var(--bad);background:var(--bad-soft);animation:shake .3s}.opt.bad .mk{border-color:var(--bad);background:var(--bad);color:#fff}
  .opt:disabled{cursor:default}
  @keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-4px)}75%{transform:translateX(4px)}}
  .why{margin-top:12px;font-size:13.5px;line-height:1.8;color:var(--body);background:var(--ind-soft2);border-left:4px solid var(--ind);border-radius:0 8px 8px 0;padding:12px 15px}.why b{color:var(--ink)}

  .nav{display:flex;gap:10px;margin-top:34px;padding-top:20px;border-top:1px solid var(--line);align-items:center}
  .nav button{font-family:inherit;font-weight:700;cursor:pointer;border-radius:11px;transition:.16s;border:1.5px solid var(--line2);background:#fff;color:var(--body);display:flex;align-items:center;justify-content:center;gap:6px}
  .nav .side{width:48px;height:48px}.nav .side svg{width:20px;height:20px;stroke:currentColor;stroke-width:2;fill:none}
  .nav .side:hover:not(:disabled){border-color:var(--ind);color:var(--ind-deep)}
  .nav .stg{flex:1;height:48px;font-size:14px}.nav .stg svg{width:18px;height:18px;stroke:currentColor;stroke-width:2;fill:none}
  .nav .stg.down{background:var(--ind);border-color:var(--ind);color:#fff}.nav .stg.down:hover:not(:disabled){background:var(--ind-deep)}
  .nav .stg.up:hover:not(:disabled){border-color:var(--ind);color:var(--ind-deep)}
  .nav button:disabled{opacity:.32;cursor:not-allowed}
  .donehint{display:flex;align-items:center;justify-content:center;gap:6px;text-align:center;font-size:12.5px;color:var(--mut);margin-top:14px}
  .donehint svg{width:14px;height:14px;stroke:currentColor;stroke-width:2.4;fill:none}
  .donehint.ok{color:var(--ok);font-weight:700}
  .swipehint{text-align:center;font-size:11.5px;color:var(--mute);margin-top:9px;line-height:1.6}
  .chapnav{position:fixed;top:50%;transform:translateY(-50%);z-index:25;width:42px;height:42px;border-radius:50%;
    display:grid;place-items:center;cursor:pointer;border:1.5px solid var(--line2);background:#fff;color:var(--ink);
    box-shadow:0 6px 18px rgba(20,20,40,.13);transition:.18s;opacity:0;pointer-events:none}
  .chapnav.left{left:16px}.chapnav.right{right:16px}
  .chapnav.show{opacity:1;pointer-events:auto}
  .chapnav:hover:not(:disabled){border-color:var(--ind);color:var(--ind-deep);transform:translateY(-50%) scale(1.08)}
  .chapnav:disabled{opacity:.18;pointer-events:none}
  .chapnav svg{width:22px;height:22px;stroke:currentColor;stroke-width:2.3;fill:none;stroke-linecap:round;stroke-linejoin:round}
  .chapnav.ready{background:var(--ind);color:#fff;border-color:var(--ind);transform:translateY(-50%) scale(1.14)}

  /* ===== 추가 모드 UI ===== */
  .entry{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin:6px 0 16px}
  .ent{display:flex;flex-direction:column;align-items:flex-start;gap:7px;text-align:left;background:var(--paper);border:1.5px solid var(--line2);border-radius:13px;padding:15px 14px;cursor:pointer;transition:.16s}
  .ent:hover{border-color:var(--ind);transform:translateY(-2px);box-shadow:0 8px 20px rgba(91,91,214,.1)}
  .ent-ic{width:34px;height:34px;border-radius:9px;display:grid;place-items:center;background:var(--ind-soft);color:var(--ind-deep)}
  .ent-ic svg{width:19px;height:19px;stroke:currentColor;stroke-width:1.9;fill:none;stroke-linecap:round;stroke-linejoin:round}
  .ent-t{font-weight:700;color:var(--ink);font-size:14px}
  .ent-s{font-size:11px;color:var(--mut);line-height:1.4}
  @media(max-width:560px){.entry{grid-template-columns:1fr;gap:8px}.ent{flex-direction:row;align-items:center;gap:11px}.ent-s{margin-left:auto;text-align:right}}
  .sl-toggle{display:flex;align-items:center;justify-content:space-between;width:100%;background:none;border:none;cursor:pointer;font-size:11px;font-weight:700;letter-spacing:.5px;color:var(--ind);text-transform:uppercase;padding:0}
  .sl-toggle svg{width:16px;height:16px;stroke:var(--ind);stroke-width:2;fill:none;transition:.2s}
  .sl-toggle.open svg{transform:rotate(180deg)}
  .usage[hidden]{display:none}
  .usage{margin-top:12px}

  .scrh{margin-bottom:18px}
  .sback{display:inline-flex;align-items:center;gap:5px;font-size:13px;font-weight:700;color:var(--mut);background:none;border:none;cursor:pointer;padding:0;margin-bottom:14px}
  .sback:hover{color:var(--ind)}.sback svg{width:17px;height:17px;stroke:currentColor;stroke-width:2.2;fill:none;stroke-linecap:round;stroke-linejoin:round}
  .sttl{font-size:24px;font-weight:900;color:var(--ink);letter-spacing:-.5px}
  .ssub{font-size:13px;color:var(--mut);margin-top:8px;line-height:1.6}
  .src{display:block;margin-top:8px;font-size:11px;color:var(--mut);font-weight:600}

  .revs{display:flex;flex-direction:column;gap:12px}
  .rev{border:1px solid var(--line2);border-radius:12px;padding:16px;background:var(--paper)}
  .revq{font-size:15px;font-weight:700;color:var(--ink);line-height:1.55;display:flex;gap:9px}
  .revn{flex:0 0 auto;width:23px;height:23px;border-radius:50%;background:var(--ind-soft);color:var(--ind-deep);display:grid;place-items:center;font-size:12px;font-weight:800;font-family:'JetBrains Mono',monospace}
  .reva{margin-top:12px;font-size:14px;line-height:1.75;color:var(--body);background:var(--ind-soft2);border-left:3px solid var(--ind);border-radius:0 7px 7px 0;padding:12px 14px}.reva b{color:var(--ink)}
  .revt{margin-top:11px;font-size:12.5px;font-weight:700;color:var(--ind-deep);background:none;border:1px solid var(--line2);border-radius:8px;padding:7px 14px;cursor:pointer}
  .revt:hover{border-color:var(--ind)}

  .oxprog{height:6px;background:var(--line);border-radius:3px;overflow:hidden;margin-bottom:22px}.oxprog i{display:block;height:100%;background:var(--ind);transition:width .3s}
  .oxq{font-size:18px;font-weight:700;color:var(--ink);line-height:1.6;min-height:2.6em;margin-bottom:20px}
  .oxbtns{display:grid;grid-template-columns:1fr 1fr;gap:12px}
  .oxb{height:88px;border-radius:14px;border:2px solid var(--line2);background:var(--paper);font-size:32px;font-weight:900;cursor:pointer;transition:.15s;color:var(--mute);font-family:'JetBrains Mono',monospace}
  .oxb.o:hover:not(:disabled){border-color:var(--ok);color:var(--ok)}.oxb.x:hover:not(:disabled){border-color:var(--bad);color:var(--bad)}
  .oxb.ok{border-color:var(--ok);background:var(--ok-soft);color:var(--ok)}.oxb.bad{border-color:var(--bad);background:var(--bad-soft);color:var(--bad)}
  .oxb:disabled{cursor:default}
  .oxfb{margin-top:18px;font-size:14px;line-height:1.75;border-radius:10px;padding:13px 15px;color:var(--body)}
  .oxfb.ok{background:var(--ok-soft);border-left:3px solid var(--ok)}.oxfb.bad{background:var(--bad-soft);border-left:3px solid var(--bad)}.oxfb b{color:var(--ink)}
  .bigbtn{width:100%;margin-top:20px;height:50px;border-radius:12px;background:var(--ind);color:#fff;font-size:15px;font-weight:700;border:none;cursor:pointer;transition:.15s}
  .bigbtn:hover{background:var(--ind-deep)}
  .oxres{text-align:center;padding:24px 0}
  .oxscore{font-size:52px;font-weight:900;color:var(--ind);font-family:'JetBrains Mono',monospace;line-height:1}
  .oxscore span{font-size:22px;color:var(--mut)}

  .msets{display:flex;flex-direction:column;gap:12px}
  .mset{display:flex;align-items:center;gap:14px;text-align:left;border:1.5px solid var(--line2);border-radius:13px;padding:18px;background:var(--paper);cursor:pointer;transition:.16s}
  .mset:hover:not(.locked){border-color:var(--ind);transform:translateY(-2px);box-shadow:0 8px 20px rgba(91,91,214,.1)}
  .mset.locked{opacity:.5;cursor:not-allowed}
  .msn{font-family:'JetBrains Mono',monospace;font-weight:900;font-size:18px;color:var(--ind);flex:0 0 auto}
  .mst{font-weight:700;color:var(--ink);font-size:15px}.msc{margin-left:auto;font-size:12px;color:var(--mut)}
  .mockq{font-size:16px;font-weight:700;color:var(--ink);line-height:1.6;margin-bottom:16px}.mockq .qn{color:var(--ind);font-family:'JetBrains Mono',monospace;margin-right:7px}
  .mrev{display:flex;flex-direction:column;gap:10px;margin-top:10px}
  .mrv{border-radius:10px;padding:13px 15px;font-size:13px;line-height:1.65}
  .mrv.ok{background:var(--ok-soft);border-left:3px solid var(--ok)}.mrv.bad{background:var(--bad-soft);border-left:3px solid var(--bad)}

{ id:8, title:'웹 기반 데이터 수집', spine:'모은다 (웹)',

      {q:`HTML을 가져오는(요청) 라이브러리는?`,o:['requests','BeautifulSoup','numpy','pandas'],ans:0,why:`가져오는 일은 requests가 합니다.`}

{ id:9, title:'공공데이터 수집과 활용', spine:'모은다 (공공)',
 levels:[
  { type:'read', flow:['크롤링 = 불안정·위험','기관 제공 묶음 (3형식)','OPEN API로 실시간'],
    body:`<p>크롤링은 남의 웹에서 정보를 가져오는 일이라서, 사이트가 바뀌면 <b>오류가 나거나 법적으로 문제가</b> 될 수 있습니다. 반면 공공데이터는 기관이 가져가 쓰라고 직접 깔끔하게 정리해서 <b>묶음 상품(데이터 파일)</b>으로 내놓은 것이라, 안전하고 합법입니다.</p>
    <div class="ana">이 묶음 상품의 포장 형식이 세 가지인데, 그것이 바로 <b>CSV · JSON · XML</b>입니다. 더 실시간으로 받고 싶으면 <b>OPEN API</b>라는 자판기에 인증키를 넣고 직접 뽑아 씁니다.</div>
    <p>그리고 XML 같은 형식은 맨 윗줄에 이 파일이 어떤 버전이고 어떤 글자 코드인지를 적어 두는데, 그 안내문을 <b>선언부</b>라고 합니다.</p>`,
    items:[
      {q:`크롤링보다 공공데이터가 안전·신뢰되는 이유는?`,o:['더 빨라서','기관이 합법적으로, 정제된 형식으로 직접 제공해서','용량이 작아서','색이 예뻐서'],ans:1,why:`기관이 합법적으로 정제된 형식으로 직접 제공하므로 안정적입니다.`},
      {q:`같은 한글 CSV가 어떤 코드에선 깨진다. 원인과 해결은?`,o:['파일 손상이라 다시 받는다','인코딩 차이라 utf-8 실패 시 cp949로 읽는다','바이러스라 백신을 돌린다','용량 초과라 나눈다'],ans:1,why:`공공 한글 파일은 cp949인 경우가 많아서, utf-8로 실패하면 cp949로 다시 읽습니다.`},
      {q:`공공데이터의 세 가지 형식은?`,o:['HTML·CSS·JS','CSV·JSON·XML','TXT·PDF·HWP','MP3·MP4·AVI'],ans:1,why:`구조화된 데이터의 3대 형식입니다.`}
    ]},
  { type:'read', anim:'xml4',
    body:`<p>XML은 데이터를 <b>태그로 감싸서</b> 부모와 자식으로 중첩한 트리(계층) 구조입니다. 구조는 네 부분으로 정해져 있습니다. 아래 버튼으로 위치를 확인해 봅니다.</p>`,
    items:[
      {q:`XML에서 버전·인코딩 등 파일 정보를 표시하는 부분은?`,o:['루트','선언부','속성','요소'],ans:1,why:`선언부는 맨 위의 <?xml ?> 부분입니다.`},
      {q:`<이름>홍길동</이름> 처럼 데이터를 담는 기본 단위는?`,o:['선언부','요소','속성','루트'],ans:1,why:`데이터를 담는 기본 단위는 요소(Element)입니다.`},
      {q:`태그 내부의 id="1" 같은 부가 정보는?`,o:['선언부','루트','속성','요소'],ans:2,why:`태그 내부의 부가 정보는 속성(Attribute)입니다.`}
    ]},
  { type:'quiz',
    items:[
      {q:`공공데이터의 세 가지 형식은? (★확정)`,o:['HTML·CSS·JS','CSV·JSON·XML','JPG·PNG·GIF','TXT·PDF·HWP'],ans:1,why:`CSV·JSON·XML입니다.`},
      {q:`XML에서 파일 정보(버전·인코딩)를 표시하는 부분은? (★확정)`,o:['요소','선언부','속성','루트'],ans:1,why:`선언부입니다.`},
      {q:`XML 문서를 이루는 4요소는?`,o:['head·body·title·meta','선언부·루트·요소·속성','CSV·JSON·XML·API','min·Q1·중앙·max'],ans:1,why:`선언부·루트·요소·속성입니다.`},
      {q:`프로그램이 실시간으로 데이터를 호출하는 인터페이스는?`,o:['robots.txt','OPEN API','CSV','파싱'],ans:1,why:`OPEN API이고, 인증키가 필요합니다.`}
    ]},
  { type:'quiz',
    items:[
      {q:`문자열 XML을 트리 객체로 바꾸는 함수 ET.____는?`,o:['parse','fromstring','iter','findtext'],ans:1,why:`ET.fromstring으로 문자열을 트리로 만듭니다. 파일이면 parse를 씁니다.`},
      {q:`OPEN API로 데이터를 수집하는 4단계 순서는?`,o:['호출→인증키→수신→URL','인증키→URL생성→호출→수신','URL→수신→인증키→호출','수신→호출→URL→인증키'],ans:1,why:`인증키 발급, URL 생성, 호출, 수신의 순서입니다.`},
      {q:`전체 25,418건인 데이터를 OPEN API로 1회 호출하면?`,o:['전부 한 번에','최대 1,000건','100건','10건'],ans:1,why:`한 번에 최대 1,000건까지 받습니다.`},
      {q:`CSV가 XML보다 더 적합한 경우는?`,o:['복잡한 계층 데이터','쉼표로 구분되는 간결한 표','이미지 저장','실시간 영상'],ans:1,why:`CSV는 간결한 표에 적합합니다.`}
    ]},
  { type:'quiz',
    items:[
      {q:`OPEN API의 인증키란?`,o:['파일 압축키','API를 쓰려 발급받는 고유 키','비밀번호 해제 코드','정렬 기준'],ans:1,why:`API를 쓰려고 발급받는 고유 키이고, 일일 트래픽 제한이 있습니다.`},
      {q:`공공데이터 제공 방식 중 '시각화 자료'의 형태는?`,o:['CSV 파일','차트·지도·대시보드','XML 태그','API 키'],ans:1,why:`가공 없이 바로 보는 차트나 지도, 대시보드입니다.`},
      {q:`XML이 복잡한 계층 데이터에 적합한 이유는?`,o:['용량이 작아서','태그로 부모-자식을 중첩해 의미·구조가 명확해서','색이 있어서','더 빨라서'],ans:1,why:`태그로 부모와 자식을 중첩해서 구조를 명확히 표현하기 때문입니다.`}
    ]}
 ]},
{ id:10, title:'통계 활용', spine:'본다 (해석)',
 levels:[
  { type:'read', anim:'anscombe', flow:['평균은 분포를 숨김','시각화로 확인 (앤스콤)','5수요약·IQR'],
    body:`<p>평균은 복잡한 데이터를 숫자 하나로 줄여 줘서 편하지만, 그만큼 많은 것을 숨깁니다. <b>평균이 같다고 해서 데이터가 같은 것은 결코 아닙니다.</b></p>
    <div class="ana">실제로 앤스콤이라는 사람이 만든 네 묶음은 평균도 분산도 거의 똑같은데, 점으로 찍어 보면 모양이 완전히 다릅니다. 어떤 것은 직선이고, 어떤 것은 곡선이며, 어떤 것은 점 하나가 전체를 망칩니다. 그래서 <b>숫자만 믿지 말고 반드시 그림으로</b> 봐야 합니다.</div>
    <p>데이터가 얼마나 퍼졌는지, 이상한 값이 있는지 보려고 다섯 개 숫자(최소·Q1·중앙·Q3·최대)로 요약하고, 상자 그림으로 한눈에 봅니다.</p>`,
    items:[
      {q:`평균만 보면 속을 수 있는 이유는?`,o:['평균이 항상 틀려서','평균이 분포·이상치·산포를 숨겨서','평균이 너무 커서','데이터가 적어서'],ans:1,why:`평균은 분포와 이상치, 산포를 숨기기 때문입니다.`},
      {q:`앤스콤의 사중주가 주는 교훈은?`,o:['평균이 최고','통계가 같아도 시각화로 확인하라','데이터 많을수록 정확','상관계수 무시'],ans:1,why:`통계치가 같아도 반드시 시각화로 확인해야 합니다.`},
      {q:`'평균이 같다'가 뜻하는 것은?`,o:['데이터가 같다','분포까지 같지는 않다','분산도 같다','이상치도 같다'],ans:1,why:`평균이 같다고 분포까지 같은 것은 아닙니다.`}
    ]},
  { type:'read', anim:'boxplot',
    body:`<p>분포를 다섯 숫자로 요약하는 것을 <b>5수 요약</b>이라 하고, 사분위 범위로 이상치를 잡습니다.</p>
    <table><tr><th>개념</th><th>뜻</th></tr>
    <tr><td><b>5수 요약</b></td><td>최솟값·Q1·중앙값·Q3·최댓값</td></tr>
    <tr><td><b>IQR</b></td><td>Q3 − Q1. 경계는 Q1−1.5·IQR 부터 Q3+1.5·IQR 까지</td></tr>
    <tr><td><b>polyfit(x,y,1)</b></td><td>1차 회귀이고, (기울기, 절편)을 돌려줌</td></tr></table>`,
    items:[
      {q:`5수 요약을 이루는 다섯 값은?`,o:['평균·분산·표준편차·왜도·첨도','최소·Q1·중앙·Q3·최대','합·평균·개수·최대·최소','Q1·Q2·Q3·IQR·범위'],ans:1,why:`최소·Q1·중앙·Q3·최대입니다.`},
      {q:`IQR의 정의는?`,o:['최대−최소','Q3−Q1','평균−중앙','Q1+Q3'],ans:1,why:`IQR은 Q3에서 Q1을 뺀 값입니다.`},
      {q:`np.polyfit(x,y,1)의 반환 순서는?`,o:['(절편,기울기)','(기울기,절편)','(x,y)','(평균,분산)'],ans:1,why:`(기울기, 절편) 순서로 돌려줍니다.`}
    ]},
  { type:'quiz',
    items:[
      {q:`앤스콤의 사중주의 교훈은?`,o:['평균이 중요','시각화로 확인','데이터 많을수록 정확','상관계수 무시'],ans:1,why:`시각화로 확인해야 합니다.`},
      {q:`5수 요약 다섯 값은?`,o:['평균·분산·…','최소·Q1·중앙·Q3·최대','합·평균·…','Q1~Q4'],ans:1,why:`최소·Q1·중앙·Q3·최대입니다.`},
      {q:`전체로 합치면 결론이 뒤집히는 심슨의 역설은 어느 오류?`,o:['전형값 착각','이상치 왜곡','집단구성 무시','변동성 무시'],ans:2,why:`집단구성, 즉 숨은 변수를 무시해서 생깁니다.`},
      {q:`이상치에 둔감해 평균을 보완하는 대푯값은?`,o:['평균','중앙값','최댓값','합계'],ans:1,why:`중앙값입니다.`}
    ]},
  { type:'quiz',
    items:[
      {q:`IQR을 이용한 이상치 상한 경계는?`,o:['Q3 + 1.5·IQR','Q1 − 1.5·IQR','Q2 + IQR','평균 + 2·표준편차'],ans:0,why:`상한은 Q3+1.5·IQR입니다.`},
      {q:`np.polyfit(x,y,1)의 반환은?`,o:['(절편,기울기)','(기울기,절편)','(x,y)','(평균,분산)'],ans:1,why:`(기울기, 절편)입니다.`},
      {q:`두 반 영어 평균이 둘 다 50인데 데이터가 다르다. 무슨 뜻일까?`,o:['데이터가 같음','분포(산포)가 다름','계산 오류','점수가 같음'],ans:1,why:`평균이 같아도 분포가 다르므로, 같은 데이터가 아닙니다.`},
      {q:`groupby 후 Q1, Q3를 구하는 함수는?`,o:['mean()','quantile(0.25), quantile(0.75)','median()','std()'],ans:1,why:`quantile(0.25)이 Q1, quantile(0.75)가 Q3입니다.`}
    ]},
  { type:'quiz',
    items:[
      {q:`평균만 볼 때의 5대 오류에 없는 것은?`,o:['전형값 착각','이상치 왜곡','정규화 오류','집단구성 무시'],ans:2,why:`정규화 오류는 5대 오류에 없습니다.`},
      {q:`표준편차·분산이 나타내는 것은?`,o:['평균값','평균에서 퍼진 정도(산포)','최댓값','데이터 개수'],ans:1,why:`평균에서 얼마나 퍼져 있는지인 산포를 나타냅니다.`},
      {q:`왜도와 첨도는 각각 무엇인가?`,o:['크기와 순서','좌우 치우침과 뾰족/평평','평균과 분산','최대와 최소'],ans:1,why:`왜도는 좌우 치우침, 첨도는 뾰족하거나 평평한 정도입니다.`}
    ]}
 ]},
{ id:11, title:'편향된 데이터', spine:'의심한다 (검증)',

 {q:`중앙값은 이상치에 둔감해 평균을 보완한다.`,a:true,why:`크기순 가운데 값.`,src:'10장 · 통계'},
 {q:`심슨의 역설은 변동성 무시 오류에 해당한다.`,a:false,why:`집단구성(숨은 변수) 무시입니다.`,src:'10장 · 5대오류'},
 {q:`표준편차는 데이터가 평균에서 퍼진 정도를 나타낸다.`,a:true,why:`산포.`,src:'10장 · 산포'},
 {q:`왜도는 분포의 좌우 치우침, 첨도는 뾰족/평평한 정도다.`,a:true,why:`분포 모양 지표.`,src:'10장 · 분포'},
 {q:`평균만 봐도 이상치 유무를 정확히 알 수 있다.`,a:false,why:`평균은 이상치를 숨깁니다.`,src:'10장 · 평균의 함정'},
 {q:`quantile(0.25)는 Q1, quantile(0.75)는 Q3를 구한다.`,a:true,why:`사분위.`,src:'10장 · 코드'},
 {q:`표본 크기가 다른데 단순평균을 내면 가중치 무시 오류가 생긴다.`,a:true,why:`가중평균이 필요.`,src:'10장 · 5대오류'},
 {q:`앤스콤 4셋의 회귀식은 서로 완전히 다르다.`,a:false,why:`회귀식·평균·분산이 거의 같습니다.`,src:'10장 · 앤스콤'},
 {q:`평균은 극단값(이상치)에 크게 흔들린다.`,a:true,why:`그래서 중앙값을 함께 봅니다.`,src:'10장 · 통계'},
 {q:`데이터사우루스 더즌도 통계는 같고 모양은 다른 사례다.`,a:true,why:`앤스콤과 비슷한 사례.`,src:'10장 · 앤스콤'},
 {q:`두 회사 평균연봉이 같으면 표준편차도 반드시 같다.`,a:false,why:`산포는 다를 수 있습니다.`,src:'10장 · 산포'},
 {q:`groupby로 그룹별 사분위를 구할 수 있다.`,a:true,why:`반별 Q1·Q3 등.`,src:'10장 · 코드'},
 {q:`5수 요약은 평균이 못 보여주는 격차를 드러낸다.`,a:true,why:`분포 요약.`,src:'10장 · 5수요약'},
 {q:`평균만 볼 때의 5대 오류에 '정규화 오류'가 포함된다.`,a:false,why:`전형값·이상치·변동성·가중치·집단구성입니다.`,src:'10장 · 5대오류'},

 {q:`편향은 수집 데이터가 모집단을 치우치게 담은 상태다.`,a:true,why:`현실을 제대로 대표 못함.`,src:'11장 · 편향'},
 {q:`편향된 데이터는 무조건 버려야 한다.`,a:false,why:`원인을 찾아 보정합니다.`,src:'11장 · 편향'},
 {q:`편향 4대 원인은 선택·결측·측정·수집과정이다.`,a:true,why:`네 갈래.`,src:'11장 · 편향'},
 {q:`심슨의 역설은 하위집단마다 우세한데 합치면 역전되는 현상이다.`,a:true,why:`합산 시 결론 뒤집힘.`,src:'11장 · 심슨'},
 {q:`심슨의 역설의 원인은 숨은 변수가 불균등하게 배정된 것이다.`,a:true,why:`예: 난이도.`,src:'11장 · 심슨'},
 {q:`자발적 설문은 응답자만 보면 만족도가 과소평가된다.`,a:false,why:`과대평가됩니다(응답 편향).`,src:'11장 · 응답 편향'},
 {q:`측정 편향은 공통 루브릭과 Z-score 표준화로 보정한다.`,a:true,why:`기준 차이 보정.`,src:'11장 · 측정'},
 {q:`선택 편향 해결책으로 무작위추출·층화표집·가중치가 있다.`,a:true,why:`대표성 회복.`,src:'11장 · 선택'},
 {q:`이상치 삭제는 선택 편향의 대표적 해결책이다.`,a:false,why:`선택 편향과 관계 없습니다.`,src:'11장 · 선택'},
 {q:`혼란변수는 결과에 영향을 주는 숨은 변수다.`,a:true,why:`심슨의 원인.`,src:'11장 · 편향'},
 {q:`모집단은 알고 싶은 전체 대상, 표본은 그중 일부다.`,a:true,why:`기본 정의.`,src:'11장 · 편향'},
 {q:`결측 편향은 일부 그룹이 체계적으로 누락되는 것이다.`,a:true,why:`민감 질문 회피 등.`,src:'11장 · 결측'},
 {q:`편향 데이터 분석 5단계의 마지막은 보정 적용이다.`,a:false,why:`마지막은 한계·범위 명시입니다.`,src:'11장 · 분석 5단계'},
 {q:`결론은 데이터가 대표하는 범위로 한정해야 한다.`,a:true,why:`포괄적 일반화 금지.`,src:'11장 · 분석 5단계'},
 {q:`학과별로는 여성 합격률이 높은데 전체로는 남성이 높다면 심슨의 역설이다.`,a:true,why:`난이도라는 숨은 변수.`,src:'11장 · 심슨'},
 {q:`응답 편향은 선택 편향의 한 종류다.`,a:true,why:`자발적 응답자만 모임.`,src:'11장 · 응답 편향'},
 {q:`편향은 평균·비율을 왜곡해 불리한 결정으로 이어질 수 있다.`,a:true,why:`그래서 점검이 필요.`,src:'11장 · 편향'},
 {q:`가중치 보정은 표본 비율을 모집단 비율에 맞추는 것이다.`,a:true,why:`대표성 회복.`,src:'11장 · 보정'},
 {q:`"한국 대학생은 A를 선호한다"처럼 포괄적으로 결론짓는 것이 옳다.`,a:false,why:`표본이 대표하는 범위로 한정해야 합니다.`,src:'11장 · 분석 5단계'},
 {q:`숫자가 정확한가보다 '어떻게 모였나·누가 빠졌나'를 먼저 물어야 한다.`,a:true,why:`편향 점검의 핵심 태도.`,src:'11장 · 편향'},
];

function renderReview(){
  screenStart();$('#crumb').textContent='복기 10선';
  $('#view').innerHTML=`<div class="scrh"><button class="sback" id="sb">${icSvg(CHV.l)} 홈</button><div class="sttl">시험 전 복기 질문 10선</div><div class="ssub">질문을 먼저 떠올려 답하고, 눌러서 정답을 확인하세요.</div></div>
    <div class="revs">${REVIEW.map((r,i)=>`<div class="rev"><div class="revq"><span class="revn">${i+1}</span>${r.q}</div><div class="reva" hidden><b>답.</b> ${r.a}<div class="src">출처 ${r.src}</div></div><button class="revt">정답 보기</button></div>`).join('')}</div>`;
  $('#sb').onclick=renderHome;
  $$('.rev',$('#view')).forEach(el=>{const t=el.querySelector('.revt'),a=el.querySelector('.reva');t.onclick=()=>{a.hidden=!a.hidden;t.textContent=a.hidden?'정답 보기':'접기';};});
}

let oxI=0,oxScore=0;
function goOX(){oxI=Math.min(state.ox.i||0,OX.length);oxScore=state.ox.score||0;renderOX();}   /* 저장된 위치에서 이어풀기 */
function renderOX(){
  screenStart();$('#crumb').textContent='OX 퀴즈';
  if(oxI>=OX.length){$('#view').innerHTML=`<div class="scrh"><button class="sback" id="sb">${icSvg(CHV.l)} 홈</button><div class="sttl">OX 퀴즈 완료</div></div><div class="oxres"><div class="oxscore">${oxScore} <span>/ ${OX.length}</span></div><button class="bigbtn" id="again">다시 풀기</button></div>`;$('#sb').onclick=renderHome;$('#again').onclick=()=>{state.ox={i:0,score:0};persist();oxI=0;oxScore=0;renderOX();};return;}
  const q=OX[oxI];
  $('#view').innerHTML=`<div class="scrh"><button class="sback" id="sb">${icSvg(CHV.l)} 홈</button><div class="sttl">OX 퀴즈</div><div class="ssub">${oxI+1} / ${OX.length} · 맞은 개수 ${oxScore}</div></div>
    <div class="oxprog"><i style="width:${oxI/OX.length*100}%"></i></div>
    <div class="oxq">${q.q}</div>
    <div class="oxbtns"><button class="oxb o" data-v="1">O</button><button class="oxb x" data-v="0">X</button></div>
    <div class="oxfb" id="fb" hidden></div><button class="bigbtn" id="next" hidden>다음 →</button>`;
  $('#sb').onclick=renderHome;
  $$('.oxb',$('#view')).forEach(b=>b.onclick=()=>{const fb=$('#fb');if(fb.dataset.done)return;const v=b.dataset.v==='1',ok=v===q.a;if(ok)oxScore++;state.ox={i:oxI,score:oxScore};persist();
    $$('.oxb',$('#view')).forEach(x=>x.disabled=true);b.classList.add(ok?'ok':'bad');
    fb.dataset.done=1;fb.hidden=false;fb.className='oxfb '+(ok?'ok':'bad');fb.innerHTML=`<b>${ok?'정답':'오답'} · 답은 ${q.a?'O':'X'}.</b> ${q.why}<div class="src">출처 ${q.src}</div>`;$('#next').hidden=false;});
  $('#next').onclick=()=>{oxI++;state.ox={i:oxI,score:oxScore};persist();renderOX();};
}

let mockSet=0,mockI=0,mockAns=[];
function goMock(){renderMockHome();}
function renderMockHome(){
  screenStart();$('#crumb').textContent='모의고사';const locked=false;   /* 잠금 해제 — 항상 열림 */
  $('#view').innerHTML=`<div class="scrh"><button class="sback" id="sb">${icSvg(CHV.l)} 홈</button><div class="sttl">모의고사</div><div class="ssub">${locked?'모든 칸(25개)을 클리어하면 열립니다. 현재 '+doneCount()+'/25.':'세트를 골라 시작하세요. 각 '+MOCK[0].q.length+'문항.'}</div></div>
    <div class="msets">${MOCK.map((m,i)=>`<button class="mset${locked?' locked':''}" data-i="${i}" ${locked?'disabled':''}><span class="msn">SET ${String.fromCharCode(65+i)}</span><span class="mst">${m.title}</span><span class="msc">${m.q.length}문항</span></button>`).join('')}</div>`;
  $('#sb').onclick=renderHome;
  if(!locked)$$('.mset',$('#view')).forEach(b=>b.onclick=()=>{mockSet=+b.dataset.i;mockI=0;mockAns=[];renderMockQ();});
}
function renderMockQ(){
  screenStart();const set=MOCK[mockSet],L=String.fromCharCode(65+mockSet);
  if(mockI>=set.q.length){const correct=mockAns.filter((a,i)=>a===set.q[i].ans).length;
    $('#view').innerHTML=`<div class="scrh"><button class="sback" id="sb">${icSvg(CHV.l)} 홈</button><div class="sttl">SET ${L} 결과</div></div>
      <div class="oxres"><div class="oxscore">${correct} <span>/ ${set.q.length}</span></div></div>
      <div class="mrev">${set.q.map((q,i)=>{const ok=mockAns[i]===q.ans;return `<div class="mrv ${ok?'ok':'bad'}"><div class="mrvq">${i+1}. ${q.q}</div><div class="mrva"><b>${ok?'정답':'오답'}</b> · 답: ${q.o[q.ans]}. ${q.why}<div class="src">출처 ${q.src}</div></div></div>`;}).join('')}</div>
      <button class="bigbtn" id="retry">다시 풀기</button>`;
    $('#sb').onclick=renderHome;$('#retry').onclick=()=>{mockI=0;mockAns=[];renderMockQ();};return;}
  const q=set.q[mockI];
  $('#view').innerHTML=`<div class="scrh"><button class="sback" id="sb">${icSvg(CHV.l)} 홈</button><div class="sttl">SET ${L}</div><div class="ssub">${mockI+1} / ${set.q.length}</div></div>
    <div class="oxprog"><i style="width:${mockI/set.q.length*100}%"></i></div>
    <div class="mockq"><span class="qn">Q${mockI+1}</span>${q.q}</div>
    <div class="opts">${q.o.map((o,oi)=>`<button class="opt" data-o="${oi}"><span class="mk">${'ABCD'[oi]}</span><span>${o}</span></button>`).join('')}</div>
    <div class="why" id="why" hidden></div><button class="bigbtn" id="next" hidden>다음 →</button>`;
  $('#sb').onclick=renderHome;
  $$('.opt',$('#view')).forEach(b=>b.onclick=()=>{if(mockAns[mockI]!==undefined)return;const oi=+b.dataset.o;mockAns[mockI]=oi;
    $$('.opt',$('#view')).forEach((x,xi)=>{x.disabled=true;if(xi===q.ans)x.classList.add('ok');});if(oi!==q.ans)b.classList.add('bad');
    const w=$('#why');w.hidden=false;w.innerHTML=`<b>정답: ${q.o[q.ans]}.</b> ${q.why}<div class="src">출처 ${q.src}</div>`;$('#next').hidden=false;});
  $('#next').onclick=()=>{mockI++;renderMockQ();};
}

/* ===================== 칸 보기 ===================== */
let cur={ci:0,si:0};
function openCell(ci,si){cur={ci,si};renderCell('up');}
function flowHtml(arr){return `<div class="flow2">`+arr.map((x,i)=>(i?`<span class="a">${icSvg(CHV.r)}</span>`:'')+`<span class="c">${x}</span>`).join('')+`</div>`;}
function renderCell(anim){
  inView=true; snapBack();
  const c=MATRIX[cur.ci],cell=c.levels[cur.si],lv=cur.si+1,isRead=cell.type==='read';
  applyTheme(CHC[c.id]);
  const v=$('#view');
  v.innerHTML=`
   <div class="vmeta"><span class="ch">${icSvg(ICO.ch[c.id])} ${c.id}장 · ${c.title}</span><span class="sp">${c.spine}</span></div>
   <div class="lvtag lv${lv}">${icSvg(ICO.lv[cur.si])} 단계 ${lv} · ${LV[cur.si]}</div>
   <div class="vtitle">${LV[cur.si]}</div>
   ${isRead?`<div class="read">${cell.flow?flowHtml(cell.flow):''}${cell.body||''}</div>`:''}
   <div class="items">
     <div class="ihead">${icSvg(ICO.lv[2])} ${isRead?'확인 · 선지 테스트':'문제 · 선지 테스트'}</div>
     <div class="isub">${LVDESC[cur.si]} 보기에서 정답을 고르면 채워집니다.</div>
     <div id="iwrap"></div>
   </div>
   <div class="donehint" id="dh"></div>
   <div class="swipehint">화면을 끝까지 스크롤하면 단계가 넘어갑니다. 좌우 화살표(모바일은 좌우 스와이프)로 장을 이동합니다.</div>`;
  v.classList.remove('slin','slout','up');void v.offsetWidth;
  v.classList.add('active', anim||'up');
  $('#home').style.display='none';
  $('#crumb').textContent=`${c.id}장 · 단계 ${lv}`;
  if(isRead && cell.anim && ANIM[cell.anim]){const host=document.createElement('div');host.className='anim';host.id='anim_'+c.id+'_'+lv;
    $('.read',v).appendChild(host);ANIM[cell.anim](host);}
  renderItems(cell);
  chapLastStage[cur.ci]=cur.si;
  updateChapNav();
  window.scrollTo(0,0);
  refreshDone();
}
let chapLastStage={};
function chapterMove(d){const ni=cur.ci+d;if(ni<0||ni>=MATRIX.length)return;chapLastStage[cur.ci]=cur.si;cur.ci=ni;cur.si=(ni in chapLastStage)?chapLastStage[ni]:0;renderCell(d>0?'slin':'slout');toast((d>0?'다음 장 ':'이전 장 ')+MATRIX[ni].id+'장 · 단계 '+(cur.si+1));}
function stageMove(d){const ns=cur.si+d;if(ns<0||ns>=5)return;cur.si=ns;renderCell('up');}
function updateChapNav(){const L=$('#navL'),R=$('#navR');if(!L||!R)return;if(!inView){L.classList.remove('show');R.classList.remove('show');return;}L.classList.add('show');R.classList.add('show');L.disabled=cur.ci===0;R.disabled=cur.ci===MATRIX.length-1;}

function renderItems(cell){
  const wrap=$('#iwrap'),done=isDone(cur.ci,cur.si);
  wrap.innerHTML=cell.items.map((it,i)=>`
    <div class="item" data-i="${i}">
      <div class="iq"><span class="qn">Q${i+1}</span>${it.q}</div>
      <div class="opts">${it.o.map((o,oi)=>`<button class="opt" data-i="${i}" data-o="${oi}"><span class="mk">${'ABCD'[oi]}</span><span>${o}</span></button>`).join('')}</div>
      <div class="why" hidden></div>
    </div>`).join('');
  const solved=new Set();
  const reveal=(e,it)=>{const w=$('.why',e);w.innerHTML='<b>정답.</b> '+(it.why||'');w.hidden=false;};
  if(done){cell.items.forEach((it,i)=>{const e=wrap.querySelector(`.item[data-i="${i}"]`);$$('.opt',e).forEach(b=>{b.disabled=true;if(+b.dataset.o===it.ans)b.classList.add('ok');});reveal(e,it);});}
  $$('.opt',wrap).forEach(b=>b.onclick=()=>{const i=+b.dataset.i,o=+b.dataset.o,it=cell.items[i];if(solved.has(i))return;const e=wrap.querySelector(`.item[data-i="${i}"]`);
    if(o===it.ans){b.classList.add('ok');$$('.opt',e).forEach(x=>x.disabled=true);reveal(e,it);solved.add(i);if(solved.size===cell.items.length)markDone();}
    else{b.classList.add('bad');setTimeout(()=>b.classList.remove('bad'),350);}});
}
function markDone(){state.done[keyOf(cur.ci,cur.si)]=true;persist();updateTop();refreshDone();}
function refreshDone(){const dh=$('#dh');if(!dh)return;if(isDone(cur.ci,cur.si)){dh.innerHTML=icSvg(CHV.d)+' 완료했습니다. 아래로 당기거나 다음 단계 버튼으로 넘어갑니다.';dh.className='donehint ok';}else{dh.textContent='보기를 다 맞히면 이 칸이 채워집니다.';dh.className='donehint';}}

/* ===================== 제스처 (용수철) ===================== */
let inView=false;
const TRIG=340;                 /* 발동 임계 (높여서 오발동 방지) */
let drag=0,gdir=0,wTimer=null,cool=false,tdir=0;
let tsx=0,tsy=0,tact=false;
function atBottom(){return window.innerHeight+window.scrollY>=document.body.scrollHeight-4;}
function atTop(){return window.scrollY<=2;}
function elastic(px){return 64*(1-Math.exp(-px/130));}   /* 고무줄 — 당길수록 저항 */
function showPull(px,d){
  const bar=d>0?$('#pullbot'):$('#pulltop'),other=d>0?$('#pulltop'):$('#pullbot');
  other.style.height='0px';other.classList.remove('ready');
  bar.style.transition='none';bar.style.height=elastic(px)+'px';
  const ready=px>=TRIG;bar.classList.toggle('ready',ready);
  const chev=d>0?CHV.d:CHV.u;
  bar.innerHTML=icSvg(chev)+(ready?('놓으면 '+(d>0?'다음':'이전')+' 단계'):('더 당기면 '+(d>0?'다음':'이전')+' 단계'));
}
function snapBack(){['#pullbot','#pulltop'].forEach(s=>{const b=$(s);if(!b)return;b.style.transition='height .3s cubic-bezier(.2,.9,.3,1)';b.style.height='0px';b.classList.remove('ready');});drag=0;gdir=0;}
function fire(d){if(cool){snapBack();return;}if((d>0&&cur.si>=4)||(d<0&&cur.si<=0)){snapBack();return;}cool=true;snapBack();stageMove(d>0?1:-1);setTimeout(()=>cool=false,650);}
function onWheel(e){if(!inView||cool)return;
  let d=0;
  if(e.deltaY>0&&atBottom()&&cur.si<4)d=1;
  else if(e.deltaY<0&&atTop()&&cur.si>0)d=-1;
  if(d===0){clearTimeout(wTimer);if(drag>0)snapBack();return;}   /* 역방향/이탈 시 누적 취소 */
  e.preventDefault();
  if(gdir!==d){drag=0;gdir=d;}
  drag+=Math.abs(e.deltaY);
  showPull(drag,d);
  clearTimeout(wTimer);
  wTimer=setTimeout(()=>{if(drag>=TRIG)fire(gdir);else snapBack();},150);  /* 멈췄을 때(놓듯) 판정 */
}
let hmode=0; const HTRIG=85;   /* hmode: 0 미정 · 1 가로(장) · 2 세로(단계) */
function viewSnap(){const v=$('#view');v.style.transition='transform .28s cubic-bezier(.2,.9,.3,1)';v.style.transform='';setTimeout(()=>{v.style.transition='';},300);}
function onTS(e){if(!inView)return;const t=e.touches[0];tsx=t.clientX;tsy=t.clientY;tact=true;tdir=0;drag=0;hmode=0;}
function onTM(e){if(!inView||!tact)return;const t=e.touches[0],dx=t.clientX-tsx,dy=t.clientY-tsy;
  if(hmode===0&&(Math.abs(dx)>10||Math.abs(dy)>10)) hmode=Math.abs(dx)>Math.abs(dy)?1:2;
  if(hmode===1){                                  /* 가로 = 장 이동 (화면이 손가락 따라 이동) */
    const canN=cur.ci<MATRIX.length-1,canP=cur.ci>0,ok=dx<0?canN:canP;
    e.preventDefault();
    const v=$('#view');v.style.transition='none';v.style.transform='translateX('+(dx*(ok?0.55:0.16))+'px)';
    const ready=ok&&Math.abs(dx)>=HTRIG;
    $('#navR').classList.toggle('ready',ready&&dx<0);$('#navL').classList.toggle('ready',ready&&dx>0);
    return;
  }
  if(hmode===2){                                  /* 세로 = 단계 (기존 풀) */
    if(dy<0&&atBottom()&&cur.si<4){tdir=1;drag=-dy;e.preventDefault();showPull(drag,1);}
    else if(dy>0&&atTop()&&cur.si>0){tdir=-1;drag=dy;e.preventDefault();showPull(drag,-1);}
  }
}
function onTE(e){if(!inView||!tact)return;tact=false;const t=e.changedTouches[0],dx=t.clientX-tsx;
  $('#navL').classList.remove('ready');$('#navR').classList.remove('ready');
  if(hmode===1){const canN=cur.ci<MATRIX.length-1,canP=cur.ci>0,v=$('#view');
    if(dx<=-HTRIG&&canN){v.style.transition='';v.style.transform='';chapterMove(1);}
    else if(dx>=HTRIG&&canP){v.style.transition='';v.style.transform='';chapterMove(-1);}
    else viewSnap();                              /* 임계 미달·역방향 → 제자리 복귀(취소) */
    hmode=0;return;}
  if(tdir!==0){if(drag>=TRIG)fire(tdir);else snapBack();tdir=0;}
  hmode=0;
}
window.addEventListener('wheel',onWheel,{passive:false});
window.addEventListener('touchstart',onTS,{passive:true});
window.addEventListener('touchmove',onTM,{passive:false});
window.addEventListener('touchend',onTE,{passive:true});

let toastT=null;
function toast(m){const t=$('#toast');t.textContent=m;t.classList.add('show');clearTimeout(toastT);toastT=setTimeout(()=>t.classList.remove('show'),1700);}
$('#homeBtn').onclick=renderHome;
$('#navL').onclick=()=>chapterMove(-1);$('#navR').onclick=()=>chapterMove(1);
renderHome();
loadProgress();
</script>
</body>
</html>
