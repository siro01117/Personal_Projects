<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>인디사 기말 · 스테이지 학습 (7~11장)</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  :root{
    --ink:#1c1c28; --body:#3f3f46; --mute:#9499a3;
    --line:#e7e7ee; --line2:#d6d6e0;
    --ind:#5b5bd6; --ind-deep:#4641c4; --ind-soft:#eeeefb; --ind-soft2:#f5f5fc;
    --ok:#15803d; --ok-soft:#eafaf0; --bad:#c0344a; --bad-soft:#fdeef1;
    --paper:#fff; --bg:#ececef; --code-bg:#f5f6f9; --hl:#fde68a;
  }
  html,body{
    background:var(--bg);color:var(--body);
    font-family:'Noto Sans KR',sans-serif;line-height:1.6;
    -webkit-font-smoothing:antialiased;font-size:15px;letter-spacing:-.005em;
  }
  body{display:flex;justify-content:center;padding:0}
  .app{width:100%;max-width:760px;min-height:100vh;background:var(--paper);
       box-shadow:0 0 60px rgba(20,20,40,.08);position:relative}
  b{font-weight:700;color:var(--ink)}
  .ind{color:var(--ind);font-weight:700}
  .hl{background:linear-gradient(180deg,transparent 58%,var(--hl) 58%);padding:0 2px;font-weight:700;color:var(--ink)}
  code{font-family:'JetBrains Mono',monospace;font-size:.85em;background:var(--code-bg);
       color:#37384a;padding:1px 5px;border-radius:3px;border:1px solid #eaeaf2}
  svg.ic{width:1em;height:1em;vertical-align:-.12em;stroke:currentColor;stroke-width:2;
         fill:none;stroke-linecap:round;stroke-linejoin:round}

  /* ===== TOP BAR ===== */
  .top{position:sticky;top:0;z-index:30;background:rgba(255,255,255,.92);
       backdrop-filter:blur(6px);border-bottom:1px solid var(--line);
       display:flex;align-items:center;gap:12px;padding:12px 20px}
  .top .home-btn{display:flex;align-items:center;gap:6px;cursor:pointer;
       font-weight:700;color:var(--ink);font-size:14px;background:none;border:none}
  .top .home-btn:hover{color:var(--ind)}
  .top .crumb{font-size:12.5px;color:var(--mute);font-weight:500}
  .top .bar{flex:1;height:5px;background:var(--line);border-radius:3px;overflow:hidden;max-width:200px;margin-left:auto}
  .top .bar i{display:block;height:100%;background:var(--ind);width:0;transition:width .4s ease}
  .top .pct{font-size:12px;color:var(--mute);font-family:'JetBrains Mono',monospace;min-width:34px;text-align:right}

  /* ===== HOME ===== */
  .home{padding:34px 26px 60px}
  .home .kick{color:var(--ind);font-weight:700;font-size:12.5px;letter-spacing:.3px;margin-bottom:10px}
  .home h1{font-size:34px;font-weight:900;color:var(--ink);line-height:1.15;letter-spacing:-1px;margin-bottom:12px}
  .home .lead{font-size:14.5px;color:var(--mute);font-weight:500;line-height:1.7;margin-bottom:8px}
  .examline{display:flex;flex-wrap:wrap;gap:8px;margin:18px 0 26px}
  .examline .chip{font-size:12px;color:var(--body);background:var(--ind-soft2);
       border:1px solid var(--line);border-radius:20px;padding:5px 12px;font-weight:500}
  .examline .chip b{color:var(--ind-deep)}
  .stages{display:flex;flex-direction:column;gap:12px}
  .stage-card{display:flex;align-items:center;gap:16px;text-align:left;width:100%;
       background:var(--paper);border:1px solid var(--line2);border-radius:12px;
       padding:16px 18px;cursor:pointer;transition:.18s;position:relative}
  .stage-card:hover{border-color:var(--ind);transform:translateY(-1px);box-shadow:0 8px 22px rgba(91,91,214,.10)}
  .stage-card.locked{cursor:not-allowed;opacity:.55;background:var(--ind-soft2)}
  .stage-card.locked:hover{transform:none;border-color:var(--line2);box-shadow:none}
  .stage-card .num{flex:0 0 46px;height:46px;border-radius:11px;display:grid;place-items:center;
       background:var(--ind-soft);color:var(--ind-deep);font-weight:900;font-size:19px;
       font-family:'JetBrains Mono',monospace}
  .stage-card.done .num{background:var(--ok-soft);color:var(--ok)}
  .stage-card.locked .num{background:#e4e4ec;color:var(--mute)}
  .stage-card .meta{flex:1;min-width:0}
  .stage-card .t{font-size:16px;font-weight:700;color:var(--ink);margin-bottom:3px}
  .stage-card .s{font-size:12.5px;color:var(--mute);line-height:1.5}
  .stage-card .star{display:inline-block;font-size:10.5px;font-weight:700;color:var(--ind);
       background:var(--ind-soft);border-radius:4px;padding:1px 6px;margin-left:6px;vertical-align:1px}
  .stage-card .prog{flex:0 0 auto;display:flex;align-items:center;gap:7px;color:var(--mute);font-size:12px}
  .stage-card .dots{display:flex;gap:4px}
  .stage-card .dots i{width:7px;height:7px;border-radius:50%;background:var(--line2)}
  .stage-card .dots i.on{background:var(--ind)}
  .stage-card.done .dots i.on{background:var(--ok)}
  .reset{margin-top:30px;text-align:center}
  .reset button{background:none;border:none;color:var(--mute);font-size:12px;cursor:pointer;text-decoration:underline;font-family:inherit}
  .reset button:hover{color:var(--bad)}

  /* ===== STAGE / SLIDE ===== */
  .stage{padding:24px 26px 30px;display:none}
  .stage.active{display:block;animation:fade .35s ease}
  @keyframes fade{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
  .sl-head{margin-bottom:6px}
  .sl-head .ck{color:var(--ind);font-weight:700;font-size:12px;letter-spacing:.3px;margin-bottom:6px}
  .sl-head .ck .star{background:var(--ind-soft);border-radius:4px;padding:1px 7px;margin-left:6px;font-size:10.5px}
  .sl-dots{display:flex;gap:7px;margin:14px 0 20px}
  .sl-dots i{flex:1;height:5px;border-radius:3px;background:var(--line2);transition:.3s}
  .sl-dots i.done{background:var(--ok)}
  .sl-dots i.cur{background:var(--ind)}
  .sl-title{font-size:24px;font-weight:900;color:var(--ink);letter-spacing:-.6px;line-height:1.2;margin-bottom:14px}
  .sl-title small{display:block;font-size:13.5px;font-weight:500;color:var(--mute);letter-spacing:0;margin-top:6px;line-height:1.55}

  .teach{font-size:14.5px;color:var(--body);line-height:1.85}
  .teach p{margin:10px 0}
  .teach p b{color:var(--ink)}
  .teach h4{font-size:13px;font-weight:700;color:var(--ink);letter-spacing:.2px;margin:20px 0 8px;
       padding-bottom:5px;border-bottom:1px solid var(--line)}
  .teach ul{list-style:none;margin:8px 0}
  .teach li{position:relative;padding:4px 0 4px 16px;font-size:14px;line-height:1.7}
  .teach li::before{content:"";position:absolute;left:2px;top:13px;width:5px;height:5px;border-radius:50%;background:var(--ind)}
  .teach li b{color:var(--ink)}
  .callout{background:var(--ind-soft2);border-left:3px solid var(--ind);border-radius:0 7px 7px 0;
       padding:11px 15px;margin:14px 0;font-size:13.8px;line-height:1.7}
  .callout .pill{display:inline-block;background:var(--ind-soft);color:var(--ind-deep);font-size:10px;
       font-weight:700;letter-spacing:.5px;padding:2px 8px;border-radius:4px;margin-right:8px;vertical-align:1px}
  .callout.warn{background:#fffaf0;border-color:#d9892b}
  .callout.warn .pill{background:#fdeccd;color:#9a5a13}
  .teach pre{background:var(--code-bg);border:1px solid #eaeaf2;border-left:3px solid var(--ind);
       border-radius:0 6px 6px 0;padding:12px 15px;margin:13px 0;font-family:'JetBrains Mono',monospace;
       font-size:12.4px;line-height:1.7;color:#33344a;overflow-x:auto}
  .teach pre .kw{color:#7c3aed;font-weight:700}.teach pre .fn{color:#0369a1;font-weight:700}
  .teach pre .str{color:#15803d}.teach pre .num{color:#b45309}.teach pre .com{color:#9499a3;font-style:italic}
  .teach table{width:100%;border-collapse:collapse;margin:13px 0;font-size:13px}
  .teach th{text-align:left;padding:8px 11px;font-weight:700;color:var(--ink);font-size:12px;
       border-bottom:2px solid var(--ink);background:var(--ind-soft2)}
  .teach td{padding:8px 11px;border-bottom:1px solid var(--line);color:var(--body);vertical-align:top;line-height:1.5}
  .teach td b{color:var(--ink)}

  /* ===== ANIM MOUNT ===== */
  .anim{margin:18px 0;border:1px solid var(--line2);border-radius:12px;padding:16px;background:#fcfcff}
  .anim .acap{font-size:11px;font-weight:700;letter-spacing:.5px;color:var(--ind);margin-bottom:12px;text-transform:uppercase}
  .anim .ctrls{display:flex;flex-wrap:wrap;gap:7px;margin:12px 0}
  .anim .ctrls button{font-family:inherit;font-size:12.5px;font-weight:700;cursor:pointer;
       border:1px solid var(--line2);background:#fff;color:var(--body);border-radius:7px;padding:7px 13px;transition:.15s}
  .anim .ctrls button:hover{border-color:var(--ind);color:var(--ind-deep)}
  .anim .ctrls button.on{background:var(--ind);border-color:var(--ind);color:#fff}
  .anim .read{font-size:13px;color:var(--body);line-height:1.6;min-height:1.6em;margin-top:6px}
  .anim .read b{color:var(--ind-deep)}
  .anim svg{display:block;width:100%;height:auto}
  .anim .big{font-family:'JetBrains Mono',monospace;font-weight:700;font-size:26px;color:var(--ink)}
  .anim .big.bad{color:var(--bad)}.anim .big.ok{color:var(--ok)}

  /* ===== QUIZ ===== */
  .quiz{margin-top:26px;border-top:2px solid var(--ink);padding-top:18px}
  .quiz .qh{font-size:12px;font-weight:700;letter-spacing:1px;color:var(--ink);margin-bottom:3px}
  .quiz .qsub{font-size:12px;color:var(--mute);margin-bottom:16px}
  .q{margin-bottom:20px}
  .q .qp{font-size:14.5px;font-weight:700;color:var(--ink);line-height:1.55;margin-bottom:10px}
  .q .qp .qn{color:var(--ind);font-family:'JetBrains Mono',monospace;margin-right:7px}
  .opts{display:flex;flex-direction:column;gap:8px}
  .opt{text-align:left;font-family:inherit;font-size:14px;color:var(--body);cursor:pointer;
       background:#fff;border:1.5px solid var(--line2);border-radius:9px;padding:11px 14px;
       transition:.14s;display:flex;gap:10px;align-items:flex-start;line-height:1.5}
  .opt:hover:not(:disabled){border-color:var(--ind);background:var(--ind-soft2)}
  .opt .mk{flex:0 0 20px;height:20px;border-radius:50%;border:1.5px solid var(--line2);
       display:grid;place-items:center;font-size:11px;font-weight:700;color:var(--mute);margin-top:1px}
  .opt.ok{border-color:var(--ok);background:var(--ok-soft);color:var(--ink)}
  .opt.ok .mk{border-color:var(--ok);background:var(--ok);color:#fff}
  .opt.bad{border-color:var(--bad);background:var(--bad-soft);color:var(--ink);animation:shake .3s}
  .opt.bad .mk{border-color:var(--bad);background:var(--bad);color:#fff}
  .opt:disabled{cursor:default}
  @keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-5px)}75%{transform:translateX(5px)}}
  .why{margin-top:9px;font-size:13px;line-height:1.65;color:var(--body);background:var(--ok-soft);
       border-left:3px solid var(--ok);border-radius:0 6px 6px 0;padding:9px 13px}
  .why b{color:var(--ink)}
  .why.lock{background:var(--ind-soft2);border-color:var(--ind)}

  /* ===== NAV ===== */
  .nav{display:flex;gap:10px;margin-top:30px;padding-top:18px;border-top:1px solid var(--line)}
  .nav button{flex:1;font-family:inherit;font-size:14.5px;font-weight:700;cursor:pointer;
       border-radius:10px;padding:13px;transition:.16s;border:1.5px solid var(--line2);background:#fff;color:var(--body)}
  .nav button.prev:hover{border-color:var(--ind);color:var(--ind-deep)}
  .nav button.next{background:var(--ind);border-color:var(--ind);color:#fff;flex:2}
  .nav button.next:hover{background:var(--ind-deep)}
  .nav button.next:disabled{background:#e4e4ec;border-color:#e4e4ec;color:var(--mute);cursor:not-allowed}
  .gatehint{text-align:center;font-size:12px;color:var(--mute);margin-top:10px}
  .gatehint.pass{color:var(--ok);font-weight:700}

  /* ===== TOAST ===== */
  .toast{position:fixed;left:50%;bottom:28px;transform:translateX(-50%) translateY(20px);
       background:var(--ink);color:#fff;font-size:13.5px;font-weight:700;padding:12px 22px;border-radius:30px;
       box-shadow:0 10px 30px rgba(0,0,0,.25);opacity:0;pointer-events:none;transition:.35s;z-index:50}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

  @media(max-width:520px){
    .home,.stage{padding-left:18px;padding-right:18px}
    .home h1{font-size:28px}
    .sl-title{font-size:21px}
    .stage-card .prog .label{display:none}
  }
</style>
</head>
<body>
<div class="app">

  <div class="top">
    <button class="home-btn" id="homeBtn">
      <svg class="ic" viewBox="0 0 24 24"><path d="M3 11l9-8 9 8M5 9v11h14V9"/></svg>
      <span>스테이지</span>
    </button>
    <span class="crumb" id="crumb">기말 7~11장</span>
    <div class="bar"><i id="topbar"></i></div>
    <span class="pct" id="toppct">0%</span>
  </div>

  <!-- HOME -->
  <section class="home" id="home"></section>

  <!-- STAGE -->
  <section class="stage" id="stage"></section>

</div>
<div class="toast" id="toast"></div>

<script>
/* =========================================================
   인디사 기말 스테이지 — 데이터 + 엔진
   ========================================================= */
const $=(s,el=document)=>el.querySelector(s);
const $$=(s,el=document)=>[...el.querySelectorAll(s)];

/* ---------- 콘텐츠 데이터 ----------
   각 챕터: {id,tag,title,sub,star,slides:[...]}
   각 슬라이드: {key,title,sub,anim,teach, quiz:[{q,opts,a,why}]}
*/
const CH = [
{
 id:7, tag:'데이터 정제·병합', title:'데이터 정제와 병합',
 sub:'더러운 데이터를 다듬고, 흩어진 표를 키로 합친다', star:'병합 ★',
 slides:[
  { key:'7-1', title:'데이터를 망치는 4가지',
    sub:'현실 데이터는 더럽다. 분석 전에 손봐야 한다.',
    teach:`
      <p>데이터 과학자는 업무 시간의 <b>80%</b>를 "데이터 청소"에 쓴다. 현실 데이터가 더러운 이유는 크게 네 가지. 두문자로 <b class="ind">결-이-형-텍</b>으로 외운다.</p>
      <table>
        <tr><th>문제</th><th>뜻 / 예시</th></tr>
        <tr><td><b>① 결측치</b></td><td>값이 빈 칸. <code>NaN</code> (응답 누락)</td></tr>
        <tr><td><b>② 이상치</b></td><td>비정상 값. 옛 결측코드 <code>-999</code> 같은 것</td></tr>
        <tr><td><b>③ 형식 불일치</b></td><td>같은 정보 다른 표기 → 병합 실패<br><code>010-1234-5678</code> vs <code>01012345678</code></td></tr>
        <tr><td><b>④ 텍스트 품질</b></td><td>대소문자·공백 차이로 중복<br><code>John Kim</code> / <code>JOHN KIM</code></td></tr>
      </table>
      <div class="callout"><span class="pill">왜</span>이걸 그대로 분석하면 평균 하나가 통째로 망가진다. 그래서 "신뢰할 수 있는 형태"로 먼저 만든다.</div>`,
    quiz:[
      {q:"데이터 품질을 저해하는 <b>4대 문제</b>가 <u>아닌</u> 것은?",
       opts:["결측치","이상치","형식 불일치","정규화"], a:3,
       why:"4대 문제는 결측치·이상치·형식 불일치·텍스트 품질(<b>결-이-형-텍</b>). 정규화는 여기 없다."},
      {q:"<code>010-1234-5678</code>과 <code>01012345678</code>이 다른 값으로 처리되는 문제는?",
       opts:["결측치","형식 불일치","이상치","텍스트 품질"], a:1,
       why:"같은 정보를 다르게 표기 → <b>형식 불일치</b>. 병합 실패의 흔한 원인."}
    ]},
  { key:'7-2', title:'이상치는 왜 중앙값으로 메우나',
    sub:'-999 하나가 평균을 음수로 끌어내린다.',
    teach:`
      <p>점수 <code>[85, 92, -999, 78]</code>의 평균을 직접 계산해보자. 아래 버튼으로 이상치를 켜고 꺼보면 평균이 어떻게 망가지는지 보인다.</p>
      <div class="anim" id="animMount"></div>
      <div class="callout"><span class="pill">개념</span>대체값은 <b>평균이 아니라 중앙값(median)</b>. 평균은 극단값에 크게 흔들리지만, 중앙값은 "가운데 값"이라 이상치에 <b>둔감</b>하기 때문.</div>
      <pre><span class="kw">if</span> (x &lt; <span class="num">0</span> <span class="kw">or</span> x &gt; <span class="num">100</span>):       <span class="com"># 범위 벗어난 값을</span>
    x = df[<span class="str">'점수'</span>].<span class="fn">median</span>()   <span class="com"># 중앙값으로 교체</span></pre>
      <p>그 외: 결측 행 통째 제거 <code>df.dropna()</code>, 값별 개수 세기 <code>df['성별'].value_counts()</code>(내림차순).</p>`,
    anim:'mean',
    quiz:[
      {q:"점수 <code>[85, 92, -999, 78]</code>의 평균값은?",
       opts:["85.0","63.0","-186.0","0.0"], a:2,
       why:"(85+92−999+78)/4 = <b>−186.0</b>. 멀쩡한 세 값 사이에 낀 −999가 평균을 음수로 끌어내린다."},
      {q:"이상치 대체에 평균이 아니라 <b>중앙값</b>을 쓰는 이유는?",
       opts:["중앙값이 계산이 더 빨라서","중앙값은 이상치에 둔감해서","평균은 항상 틀려서","중앙값이 항상 더 커서"], a:1,
       why:"중앙값은 크기순 가운데 값이라 극단값(이상치)에 거의 흔들리지 않는다 → <b>둔감</b>."}
    ]},
  { key:'7-3', title:'데이터 병합 — merge와 네 조인', star:'병합 ★',
    sub:'두 표를 공통 키로 합친다. 시험 확정 영역.',
    teach:`
      <p>현실 정보는 한 표에 다 없다. 고객 표 따로, 주문 표 따로. 이 둘을 <b>공통 키(Key)</b>로 이어붙이는 게 병합이다. 함수는 단 하나 <code>pd.merge</code>, 인자도 둘뿐.</p>
      <ul>
        <li><code>on='고객ID'</code> — <b>무엇을</b> 기준으로 합칠지(공통 키)</li>
        <li><code>how=...</code> — <b>어떤 방식</b>으로 합칠지(아래 4종)</li>
      </ul>
      <p>버튼을 눌러 네 조인이 어느 부분을 남기는지 직접 보자.</p>
      <div class="anim" id="animMount"></div>

 id:11, tag:'편향된 데이터', title:'편향된 데이터',
 sub:'치우친 데이터는 버리지 않고 원인을 알고 보정한다', star:'심슨 ★',
 slides:[

        <tr><td><b>① 선택 편향</b></td><td>특정 집단만 선택(자발적 만족도) → 무작위·층화·가중치</td></tr>
        <tr><td><b>② 결측 편향</b></td><td>일부 그룹이 체계적으로 누락(민감 질문 회피)</td></tr>

    {x:[8,8,8,8,8,8,8,19,8,8,8],y:[6.58,5.76,7.71,8.84,8.47,7.04,5.25,12.50,5.56,7.91,6.89],t:'IV · 한 점 의존'}
  ];

  const cw=cv.width/2, ch=cv.height/2, pad=34;
  const xmin=2,xmax=20,ymin=2,ymax=14;
  const plot=(d,ox,oy,prog)=>{
    const mx=v=>ox+pad+(v-xmin)/(xmax-xmin)*(cw-pad*1.4);
    const my=v=>oy+ch-pad-(v-ymin)/(ymax-ymin)*(ch-pad*1.6);
    ctx.strokeStyle='#e1e1ee'; ctx.lineWidth=1;
    ctx.strokeRect(ox+pad-6,oy+pad-12,cw-pad*1.4+12,ch-pad*1.6+18);
    // regression y=3+0.5x
    ctx.strokeStyle='#c9c9e8'; ctx.lineWidth=2; ctx.beginPath();

    tot.forEach(b=>{b.r.setAttribute('opacity',0);b.pct.setAttribute('opacity',0);b.nm.setAttribute('opacity',0);b.r.setAttribute('height',0);b.r.setAttribute('y',base);});
    grow(dept);
    $('#rd',el).innerHTML='두 학과 <b>모두 여성 합격률이 높다</b> (A 90&gt;80, B 35&gt;30).';
  };
  const showTotal=()=>{
    [hA,hB].forEach(h=>h.setAttribute('opacity',0));hT.setAttribute('opacity',1);
    dept.forEach(b=>{b.r.setAttribute('opacity',0);b.pct.setAttribute('opacity',0);b.nm.setAttribute('opacity',0);b.r.setAttribute('height',0);b.r.setAttribute('y',base);});
    tot.forEach(b=>{b.r.setAttribute('opacity',1);b.nm.setAttribute('opacity',1);});
    grow(tot);
    $('#rd',el).innerHTML='합치면 <b style="color:#c0344a">남성(70%) &gt; 여성(46%)</b>으로 역전. 여성이 어려운 B에 몰려서.';
  };
  $$('.ctrls button',el).forEach(b=>b.onclick=()=>{
    $$('.ctrls button',el).forEach(x=>x.classList.toggle('on',x===b));
    b.dataset.m==='dept'?showDept():showTotal();
  });
  showDept();
};

/* =========================================================
   진행 상태 (localStorage)
   ========================================================= */
const SAVE='inds_stage_v1';
let state = (()=>{try{return JSON.parse(localStorage.getItem(SAVE))||{done:{}};}catch(e){return {done:{}};}})();
const persist=()=>localStorage.setItem(SAVE,JSON.stringify(state));
const doneSet=(id)=>new Set(state.done[id]||[]);
const chDone=(id)=>{const c=CH.find(x=>x.id===id);return doneSet(id).size>=c.slides.length;};
const chIdx=(id)=>CH.findIndex(x=>x.id===id);
const chUnlocked=(id)=>{const i=chIdx(id);return i===0?true:chDone(CH[i-1].id);};
const totalSlides=()=>CH.reduce((a,c)=>a+c.slides.length,0);
const totalDone=()=>CH.reduce((a,c)=>a+doneSet(c.id).size,0);

const updateTop=()=>{
  const pct=Math.round(totalDone()/totalSlides()*100);
  $('#topbar').style.width=pct+'%'; $('#toppct').textContent=pct+'%';
};

/* =========================================================
   화면 — 홈
   ========================================================= */
const ICON_LOCK='<svg class="ic" viewBox="0 0 24 24"><rect x="5" y="11" width="14" height="9" rx="2"/><path d="M8 11V7a4 4 0 0 1 8 0v4"/></svg>';
const ICON_CHK='<svg class="ic" viewBox="0 0 24 24"><path d="M20 6L9 17l-5-5"/></svg>';

function renderHome(){
  const cards=CH.map((c,i)=>{
    const dn=doneSet(c.id).size, total=c.slides.length, full=chDone(c.id), locked=!chUnlocked(c.id);
    const dots=c.slides.map((_,k)=>`<i class="${k<dn?'on':''}"></i>`).join('');
    const cls=['stage-card', full?'done':'', locked?'locked':''].join(' ').trim();
    const numInner = full?ICON_CHK : (locked?ICON_LOCK : c.id);
    const star = c.star?`<span class="star">${c.star}</span>`:'';
    const status = locked ? `<span class="prog"><span class="label">잠김</span>${ICON_LOCK}</span>`
      : `<span class="prog"><span class="label">${dn}/${total}</span><span class="dots">${dots}</span></span>`;
    return `<button class="${cls}" data-ch="${c.id}" ${locked?'disabled':''}>
        <span class="num">${numInner}</span>
        <span class="meta"><span class="t">${c.id}장 ${c.title}${star}</span><span class="s">${c.sub}</span></span>
        ${status}
      </button>`;
  }).join('');
  $('#home').innerHTML=`
    <div class="kick">2026-1학기 · 인공지능과 디지털 사고</div>
    <h1>기말 스테이지<br>7 ~ 11장</h1>
    <p class="lead">슬라이드마다 <b>읽고 → 객관식으로 확인</b>. 다 맞혀야 다음이 열린다.<br>먼저 친 분반 후기 + 강의자료 전수 반영.</p>
    <div class="examline">
      <span class="chip"><b>시험</b> 06-22(월) 10:00~11:50</span>
      <span class="chip"><b>형식</b> 필기 + 실기(오픈북)</span>
      <span class="chip"><b>범위</b> 7~11장</span>
    </div>
    <div class="stages">${cards}</div>
    <div class="reset"><button id="resetBtn">진행 기록 초기화</button></div>`;
  $$('.stage-card',$('#home')).forEach(b=>{
    if(b.disabled)return;
    b.onclick=()=>openChapter(+b.dataset.ch);
  });
  $('#resetBtn').onclick=()=>{
    if(confirm('모든 진행 기록을 지울까요?')){state={done:{}};persist();renderHome();updateTop();}
  };
  $('#home').style.display='block'; $('#stage').classList.remove('active');
  $('#crumb').textContent='기말 7~11장';
  updateTop();
}

/* =========================================================
   화면 — 스테이지 / 슬라이드
   ========================================================= */
let cur={id:null,i:0};

function openChapter(id){
  cur.id=id;
  const dn=doneSet(id);
  const c=CH.find(x=>x.id===id);
  let i=c.slides.findIndex((_,k)=>!dn.has(k));
  cur.i = i<0 ? c.slides.length-1 : i;
  renderSlide();
}

function renderSlide(){
  const c=CH.find(x=>x.id===cur.id), s=c.slides[cur.i], dn=doneSet(c.id);
  const isDone=dn.has(cur.i);
  const dots=c.slides.map((_,k)=>{
    const cl=dn.has(k)?'done':(k===cur.i?'cur':'');
    return `<i class="${cl}"></i>`;
  }).join('');
  const star=s.star?`<span class="star">${s.star}</span>`:'';
  $('#stage').innerHTML=`
    <div class="sl-head">
      <div class="ck">${c.id}장 · ${c.tag}${s.boss?' · 보스':''}${star}</div>
    </div>
    <div class="sl-dots">${dots}</div>
    <div class="sl-title">${s.title}<small>${s.sub||''}</small></div>
    <div class="teach">${s.teach||''}</div>
    <div class="quiz">
      <div class="qh">${s.boss?'마무리 객관식':'확인 객관식'}</div>
      <div class="qsub">${s.boss?'다 맞히면 챕터 클리어.':'정답을 맞히면 다음 단계가 열립니다.'}</div>
      <div id="qwrap"></div>
    </div>
    <div class="nav">
      <button class="prev" id="prevBtn">${cur.i===0?'홈으로':'이전'}</button>
      <button class="next" id="nextBtn" disabled>${cur.i===c.slides.length-1?'챕터 완료':'다음 단계'}</button>
    </div>
    <div class="gatehint" id="gate">객관식을 모두 맞히면 진행할 수 있어요.</div>`;
  $('#stage').classList.add('active'); $('#home').style.display='none';
  $('#crumb').textContent=`${c.id}장 · ${cur.i+1}/${c.slides.length}`;

  // 애니메이션
  if(s.anim && ANIM[s.anim]){ const m=$('#animMount'); if(m){ m.id='animMount_'+cur.i; ANIM[s.anim](m); } }

  renderQuiz(s,isDone);

  $('#prevBtn').onclick=()=>{ if(cur.i===0){renderHome();} else {cur.i--;renderSlide();} };
  $('#nextBtn').onclick=()=>{
    if(cur.i===c.slides.length-1){ // 챕터 완료
      const justFull = chDone(c.id);
      renderHome();
      toast(justFull?`${c.id}장 클리어! ${nextName(c.id)}`:'진행 저장됨');
    } else { cur.i++; renderSlide(); }
  };
  if(isDone) unlockNext();
}

function nextName(id){
  const i=chIdx(id);
  return i<CH.length-1 ? `${CH[i+1].id}장이 열렸어요` : '전 챕터 완주!';
}

function renderQuiz(s,isDone){
  const wrap=$('#qwrap');
  wrap.innerHTML=s.quiz.map((q,qi)=>{
    const opts=q.opts.map((o,oi)=>`<button class="opt" data-qi="${qi}" data-oi="${oi}">
        <span class="mk">${'ABCD'[oi]}</span><span>${o}</span></button>`).join('');
    return `<div class="q" data-qi="${qi}">
        <div class="qp"><span class="qn">Q${qi+1}</span>${q.q}</div>
        <div class="opts">${opts}</div>
        <div class="why" hidden></div>
      </div>`;
  }).join('');
  const solved=new Set();
  const finish=()=>{ markDone(); unlockNext(); };

  if(isDone){ // 복습: 정답 미리 공개
    s.quiz.forEach((q,qi)=>{
      const qel=wrap.querySelector(`.q[data-qi="${qi}"]`);
      $$('.opt',qel).forEach(b=>{b.disabled=true; if(+b.dataset.oi===q.a)b.classList.add('ok');});
      const why=$('.why',qel); why.innerHTML='<b>정답.</b> '+q.why; why.classList.add('lock'); why.hidden=false;
    });
    return;
  }

  $$('.opt',wrap).forEach(b=>{
    b.onclick=()=>{
      const qi=+b.dataset.qi, oi=+b.dataset.oi, q=s.quiz[qi];
      if(solved.has(qi))return;
      const qel=wrap.querySelector(`.q[data-qi="${qi}"]`);
      if(oi===q.a){
        b.classList.remove('bad'); b.classList.add('ok');
        $$('.opt',qel).forEach(x=>x.disabled=true);
        const why=$('.why',qel); why.innerHTML='<b>정답.</b> '+q.why; why.hidden=false;
        solved.add(qi);
        if(solved.size===s.quiz.length) finish();
      } else {
        b.classList.add('bad');
        setTimeout(()=>b.classList.remove('bad'),350);
        b.disabled=true; // 틀린 보기는 비활성 (재시도는 남은 보기로)
      }
    };
  });
}

function markDone(){
  const arr=state.done[cur.id]||[];
  if(!arr.includes(cur.i)){arr.push(cur.i); state.done[cur.id]=arr; persist();}
  // dots 갱신
  const c=CH.find(x=>x.id===cur.id), dn=doneSet(c.id);
  $$('.sl-dots i',$('#stage')).forEach((d,k)=>{
    d.className = dn.has(k)?'done':(k===cur.i?'cur':'');
  });
  updateTop();
}

function unlockNext(){
  const btn=$('#nextBtn'); if(btn)btn.disabled=false;
  const g=$('#gate'); if(g){g.textContent= (cur.i===CH.find(x=>x.id===cur.id).slides.length-1)?'통과! 챕터 완료로 넘어가세요.':'통과! 다음 단계로.'; g.classList.add('pass');}
}

/* 토스트 */
let toastT=null;
function toast(msg){
  const t=$('#toast'); t.textContent=msg; t.classList.add('show');
  clearTimeout(toastT); toastT=setTimeout(()=>t.classList.remove('show'),2600);
}

/* 홈 버튼 */
$('#homeBtn').onclick=renderHome;

/* 시작 */
renderHome();
</script>
</body>
</html>
