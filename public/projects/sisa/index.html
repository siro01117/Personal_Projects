<!DOCTYPE html>
<html lang="ko" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>오늘의 시사 — 투명한 시사 계기판</title>
<style>
  :root{
    --sans:'Pretendard','Apple SD Gothic Neo','Malgun Gothic',system-ui,-apple-system,sans-serif;
    --mono:'JetBrains Mono','SFMono-Regular',ui-monospace,Consolas,'D2Coding',monospace;
    --radius:10px; --wrap:780px;
    /* 타입 스케일 — iOS HIG · Material3 · 마디아 수렴 (≈1.2 모듈러, 6단계) */
    --fs-display:clamp(36px,10vw,54px); /* 히어로 */
    --fs-title:22px;   /* 섹션명 · 핵심 숫자 */
    --fs-head:17px;    /* 이슈 제목 · 랭크 */
    --fs-body:14px;    /* 본문 · 링크 · 탭 (모바일 본문 하한) */
    --fs-cap:12px;     /* 캡션 · 메타 · 시간 (캡션 하한) */
    --fs-micro:11px;   /* 모노 미세 라벨 (최소선) */
    --ls-ko:-0.02em;   /* 한글 타이틀 자간 */
  }
  [data-theme="dark"]{
    --bg:#0f0f12; --surface:#17171b; --surface-2:#1f1f25; --border:#2b2b32;
    --t1:#f3f3f6; --t2:#c3c3cb; --t3:#8c8c96; --point:#5b7fff; --on-point:#0c0e18;
    --glow:rgba(91,127,255,.12); --track:rgba(255,255,255,.08);
    --ic-solid:#6b87ff; --ic-frost:rgba(107,135,255,.32);
  }
  [data-theme="light"]{
    --bg:#ffffff; --surface:#ffffff; --surface-2:#f5f6f9; --border:#e6e6ea;
    --t1:#161619; --t2:#46464d; --t3:#6b6b72; --point:#2f4fe0; --on-point:#fff;
    --glow:rgba(47,79,224,.07); --track:rgba(0,0,0,.08);
    --ic-solid:#3554e6; --ic-frost:rgba(53,84,230,.20);
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  html{-webkit-text-size-adjust:100%;}
  body{background:var(--bg); color:var(--t1); font-family:var(--sans); font-size:var(--fs-body); line-height:1.6; -webkit-font-smoothing:antialiased; transition:background .3s,color .3s;}
  .mono{font-family:var(--mono); letter-spacing:.06em; text-transform:uppercase;}
  .ico{display:block;}
  .wrap{max-width:var(--wrap); margin:0 auto; padding:0 24px;}

  /* ── 히어로 ── */
  .hero{position:relative; overflow:hidden; padding:56px 0 32px;
    background:radial-gradient(120% 90% at 85% 110%, var(--glow), transparent 60%);}
  .hero-top{display:flex; justify-content:space-between; align-items:flex-start; gap:14px; margin-bottom:clamp(34px,8vw,60px);}
  .hero-top .mono{font-size:var(--fs-cap); color:var(--t3); line-height:1.7;}
  .wordmark{text-align:center;}
  .wordmark .eyebrow{font-size:var(--fs-cap); color:var(--point); margin-bottom:16px;}
  .wordmark h1{font-size:var(--fs-display); font-weight:600; letter-spacing:var(--ls-ko); line-height:1;}
  .wordmark .sub{margin-top:18px; font-size:var(--fs-body); color:var(--t2); padding:0 6px;}

  .toggle{flex-shrink:0; font-family:var(--mono); font-size:var(--fs-micro); letter-spacing:.1em; color:var(--t3); background:none;
    border:.5px solid var(--border); border-radius:999px; padding:8px 13px; cursor:pointer; transition:.15s;}
  .toggle:hover{color:var(--t1); border-color:var(--t3);}

  /* ── 상태바 ── */
  .statusbar{display:flex; align-items:center; gap:12px; flex-wrap:wrap;
    border:.5px solid var(--border); background:var(--surface); border-radius:var(--radius); padding:12px 14px;}
  .live{display:flex; align-items:center; gap:8px; font-family:var(--mono); font-size:var(--fs-cap); letter-spacing:.05em; text-transform:uppercase; color:var(--t2); white-space:nowrap;}
  .live .dot{width:7px; height:7px; border-radius:50%; background:var(--point); box-shadow:0 0 0 3px var(--glow);}
  .statusbar .rule{flex:1; min-width:14px; height:1px; background:var(--border);}
  .upd{display:flex; align-items:center; gap:7px; font-family:var(--mono); font-size:var(--fs-cap); letter-spacing:.04em; text-transform:uppercase;
    color:var(--on-point); background:var(--point); border:none; border-radius:8px; padding:10px 16px; cursor:pointer; transition:.15s; white-space:nowrap; margin-left:auto;}
  .upd:hover{filter:brightness(1.08);} .upd:active{transform:scale(.97);} .upd:disabled{opacity:.6;}
  .upd .sp{display:inline-block; animation:spin 1s linear infinite;}
  @keyframes spin{to{transform:rotate(360deg);}}

  /* ── 콘솔 ── */
  .console{margin-top:26px; padding-bottom:70px;}
  .frame{position:relative; border:.5px solid var(--border); border-radius:14px; background:var(--surface); padding:8px 22px 22px;}
  .frame::before,.frame::after,.cn-tl,.cn-tr{content:""; position:absolute; width:14px; height:14px; border:1.5px solid var(--point); opacity:.55;}
  .frame::before{top:-1px; left:-1px; border-right:0; border-bottom:0; border-radius:14px 0 0 0;}
  .frame::after{top:-1px; right:-1px; border-left:0; border-bottom:0; border-radius:0 14px 0 0;}
  .cn-tl{bottom:-1px; left:-1px; border-right:0; border-top:0; border-radius:0 0 0 14px;}
  .cn-tr{bottom:-1px; right:-1px; border-left:0; border-top:0; border-radius:0 0 14px 0;}

  .tabs{display:flex; gap:4px; padding:12px 0 4px; border-bottom:.5px solid var(--border); overflow-x:auto;}
  .tab{display:flex; align-items:center; gap:8px; font-size:var(--fs-body); font-weight:500; color:var(--t3); background:none; border:none;
    cursor:pointer; padding:11px 16px; border-radius:9px; transition:.15s; white-space:nowrap;}
  .tab .ico{width:20px; height:20px; opacity:.6; transition:.15s;}
  .tab:hover{color:var(--t2);}
  .tab.on{color:var(--t1); background:var(--surface-2);}
  .tab.on .ico{opacity:1;}

  .sec-head{display:flex; align-items:center; gap:14px; padding:20px 2px 6px;}
  .sec-head .ico{width:38px; height:38px; flex-shrink:0;}
  .sec-name{font-size:var(--fs-title); font-weight:600; letter-spacing:-.01em;}
  .sec-meta{font-family:var(--mono); font-size:var(--fs-cap); letter-spacing:.04em; color:var(--t3); margin-top:4px; text-transform:uppercase;}

  /* ── 이슈 카드 ── */
  .issue-card{background:var(--surface); border:.5px solid var(--border); border-radius:13px; margin-bottom:10px; transition:border-color .2s, box-shadow .2s;}
  .issue-card:hover{border-color:var(--t3);}
  .issue-card.open{border-color:rgba(91,127,255,.4); box-shadow:0 0 0 1px rgba(91,127,255,.14);}
  .row{display:flex; gap:18px; padding:22px; cursor:pointer;}
  .rank{font-family:var(--mono); font-size:var(--fs-head); font-weight:600; color:var(--t3); line-height:1; padding-top:5px; width:30px; flex-shrink:0;}
  .row.open .rank{color:var(--point);}
  .rbody{flex:1; min-width:0;}
  .title{font-size:var(--fs-head); font-weight:600; letter-spacing:-.015em; line-height:1.42; margin-bottom:16px;}
  .metrics{display:flex; flex-direction:column; gap:12px;}
  .cov-metric{display:flex; align-items:center; gap:13px;}
  .cov-bar{height:6px; flex:1; max-width:160px; background:var(--track); border-radius:999px; overflow:hidden;}
  .cov-fill{height:100%; background:var(--point); border-radius:999px;}
  .cov-num{display:flex; align-items:baseline; gap:6px; white-space:nowrap;}
  .cov-num b{font-family:var(--mono); font-size:var(--fs-title); font-weight:600; color:var(--t1);}
  .cov-num span{font-family:var(--mono); font-size:var(--fs-cap); letter-spacing:.02em; color:var(--t3);}
  .time-metric{display:flex; align-items:center; gap:8px; flex-wrap:wrap; font-family:var(--mono); font-size:var(--fs-cap); letter-spacing:.03em; color:var(--t3);}
  .time-metric b{color:var(--t2); font-weight:500;}
  .time-metric .td{color:var(--border);}
  .chev{flex-shrink:0; align-self:center; color:var(--t3); font-size:20px; transition:transform .18s;}
  .row.open .chev{transform:rotate(90deg); color:var(--point);}
  .srcline{font-size:var(--fs-cap); color:var(--t3); margin-top:15px; line-height:1.5;}

  .detail{max-height:0; overflow:hidden; transition:max-height .45s ease;}
  .issue-card.open .detail{max-height:1400px;}
  .detail-in{padding:16px 22px 20px; border-top:.5px solid var(--border); display:flex; flex-direction:column; gap:12px;}
  .panel{background:var(--surface-2); border:.5px solid var(--border); border-radius:12px; padding:16px 16px 14px;}
  .panel-lbl{display:flex; align-items:center; gap:10px; font-family:var(--mono); font-size:var(--fs-micro); letter-spacing:.09em; text-transform:uppercase; color:var(--t3); margin-bottom:14px;}
  .panel-lbl .pl-no{color:var(--point); font-weight:600;}
  .panel-lbl::after{content:""; flex:1; height:.5px; background:var(--border);}

  /* 보도 흐름 스파크라인 */
  .act-wrap{background:rgba(0,0,0,.16); border-radius:var(--radius); padding:14px 14px 10px;}
  [data-theme="light"] .act-wrap{background:rgba(0,0,0,.04);}
  .act{display:flex; align-items:flex-end; gap:4px; height:52px;}
  .act i{flex:1; background:var(--point); border-radius:2px 2px 0 0; opacity:.42; transition:.15s;}
  .act i.peak{opacity:1;}
  .act i.empty{background:var(--track); opacity:1;}
  .act-axis{display:flex; justify-content:space-between; font-family:var(--mono); font-size:var(--fs-micro); letter-spacing:.04em; color:var(--t3); margin-top:8px;}
  .act-sum{font-family:var(--mono); font-size:var(--fs-cap); letter-spacing:.03em; color:var(--t3); margin-top:12px;}
  .act-sum b{color:var(--point); font-weight:500;}

  /* 매체별 원문 */
  .links{margin-top:0;}
  .lk{display:flex; gap:14px; align-items:baseline; padding:12px 0; border-bottom:.5px solid var(--border); text-decoration:none; color:var(--t1); transition:.12s;}
  .lk:last-child{border-bottom:0;}
  .lk:hover{padding-left:5px;}
  .lk:hover .lt{color:var(--point);}
  .lsrc{font-size:var(--fs-body); font-weight:500; color:var(--t2); width:84px; flex-shrink:0;}
  .lt{font-size:var(--fs-body); line-height:1.5;}
  .lt .ext{font-family:var(--mono); font-size:var(--fs-micro); color:var(--t3); margin-left:7px; letter-spacing:.04em;}

  .empty-msg{padding:36px 8px; text-align:center; color:var(--t3); font-size:var(--fs-body);}

  footer{margin-top:24px;}
  .foot-in{font-family:var(--mono); font-size:var(--fs-micro); letter-spacing:.02em; line-height:2.1; color:var(--t3); border-top:.5px solid var(--border); padding:18px 0 40px;}

  /* ── 모바일 — 폰트는 토큰이 하한을 보장, 여백·간격만 축소 ── */
  @media (max-width:600px){
    .wrap{padding:0 16px;}
    .hero{padding:40px 0 24px;}
    .frame{padding:6px 14px 18px;}
    .tab{padding:10px 13px;}
    .sec-head{gap:12px; padding:18px 2px 4px;}
    .sec-head .ico{width:34px; height:34px;}
    .row{gap:14px; padding:18px 16px;}
    .rank{width:26px;}
    .cov-bar{max-width:118px;}
    .detail-in{padding:14px 16px 18px;}
    .lsrc{width:72px;}
  }
</style>
</head>
<body data-theme="dark">

<svg width="0" height="0" style="position:absolute"><defs>
  <filter id="gb" x="-60%" y="-60%" width="220%" height="220%"><feGaussianBlur stdDeviation="2.6"/></filter>
</defs></svg>

<section class="hero">
  <div class="wrap">
    <div class="hero-top">
      <div class="mono">투명한 시사 계기판<br>NO ALGORITHM · NO AI</div>
      <button class="toggle" id="toggle">◐ THEME</button>
    </div>
    <div class="wordmark">
      <div class="eyebrow mono" id="eyebrow">경제 / 정치 / 기술</div>
      <h1>오늘의 시사</h1>
      <div class="sub" id="hero-sub">여러 매체가 동시에 다루는 이슈만 모읍니다</div>
    </div>
  </div>
</section>

<div class="wrap">
  <div class="statusbar">
    <span class="live"><span class="dot"></span>집계됨</span>
    <span class="rule"></span>
    <span class="live" id="clock">—</span>
    <button class="upd" id="update"><span id="upd-ico">↻</span> 업데이트</button>
  </div>
</div>

<div class="wrap console">
  <div class="frame">
    <span class="cn-tl"></span><span class="cn-tr"></span>
    <div class="tabs" id="tabs"></div>
    <div id="sechead"></div>
    <div id="list"></div>
  </div>
</div>

<footer class="wrap">
  <div class="foot-in">
    집계 기준 — 주요 매체의 공개 헤드라인(RSS)을 수집해, 여러 매체가 동시에 다룬 이슈일수록 상단 배치.<br>
    한 매체의 반복 보도는 1건으로 집계. 시간·보도 흐름은 각 기사의 발행 시각에서 산출.<br>
    해석 없음 · 원문 링크로 위임 · 알고리즘은 빈도·시간뿐 · AI 미사용 · 개인화 없음
  </div>
</footer>

<script>
const ICONS={
  econ:`<svg class="ico" viewBox="0 0 48 48"><circle cx="26" cy="26" r="14" fill="var(--ic-frost)" filter="url(#gb)"/><circle cx="22" cy="22" r="13" fill="none" stroke="var(--ic-solid)" stroke-width="3"/><text x="22" y="28" text-anchor="middle" font-family="var(--sans)" font-size="15" font-weight="600" fill="var(--ic-solid)">₩</text></svg>`,
  pol:`<svg class="ico" viewBox="0 0 48 48"><rect x="11" y="19" width="28" height="20" rx="3" fill="var(--ic-frost)" filter="url(#gb)"/><path d="M22 7 L37 18 L7 18 Z" fill="var(--ic-solid)"/><rect x="10" y="22" width="3.5" height="12" rx="1" fill="var(--ic-solid)"/><rect x="20" y="22" width="3.5" height="12" rx="1" fill="var(--ic-solid)"/><rect x="30" y="22" width="3.5" height="12" rx="1" fill="var(--ic-solid)"/></svg>`,
  tech:`<svg class="ico" viewBox="0 0 48 48"><rect x="14" y="16" width="24" height="24" rx="5" fill="var(--ic-frost)" filter="url(#gb)"/><rect x="11" y="13" width="20" height="20" rx="4" fill="none" stroke="var(--ic-solid)" stroke-width="3"/><rect x="17" y="19" width="8" height="8" rx="2" fill="var(--ic-solid)"/><rect x="14.5" y="7" width="2.6" height="6" rx="1" fill="var(--ic-solid)"/><rect x="24.5" y="7" width="2.6" height="6" rx="1" fill="var(--ic-solid)"/><rect x="33" y="16" width="6" height="2.6" rx="1" fill="var(--ic-solid)"/><rect x="33" y="26" width="6" height="2.6" rx="1" fill="var(--ic-solid)"/></svg>`
};
const ORDER=["econ","pol","tech"];
const pad=n=>String(n).padStart(2,"0");
function fmtAgo(h){ if(h==null)return "—"; h=Math.round(h); return h<1?"방금":h<24?h+"시간 전":Math.round(h/24)+"일 전"; }
function fmtDur(h){ if(h==null||h<=0)return "신규"; return h<24?h+"시간째":(h/24).toFixed(1).replace(/\.0$/,"")+"일째"; }

// 실제 기사 발행시각 분포 → 보도 흐름 스파크라인
function sparkline(hours,firstH){
  const B=12, W=Math.min(48,Math.max(6,(firstH||6)+1));
  const bins=new Array(B).fill(0);
  (hours||[]).forEach(h=>{ if(h<=W){ let idx=B-1-Math.floor(h/(W/B)); idx=Math.max(0,Math.min(B-1,idx)); bins[idx]++; } });
  const max=Math.max(1,...bins);
  const bars=bins.map(v=>{
    const empty=v===0;
    const ht=empty?3:Math.max(6,Math.round(v/max*46));
    const peak=!empty&&v===max;
    return `<i class="${empty?'empty':''}${peak?' peak':''}" style="height:${ht}px"></i>`;
  }).join("");
  return {bars,window:W};
}

let DATA=null, currentCat="econ";

function clockFromGen(ts){
  const d=new Date(ts);
  return `${d.getFullYear()}.${pad(d.getMonth()+1)}.${pad(d.getDate())} ${pad(d.getHours())}:${pad(d.getMinutes())} 기준`;
}
function renderTabs(){
  document.getElementById("tabs").innerHTML=ORDER.map(c=>
    `<button class="tab ${c===currentCat?'on':''}" data-cat="${c}">${ICONS[c]}${DATA.cats[c].name}</button>`).join("");
}
function render(cat){
  currentCat=cat; renderTabs();
  const c=DATA.cats[cat], items=c.issues||[];
  document.getElementById("sechead").innerHTML=
    `<div class="sec-head">${ICONS[cat]}<div><div class="sec-name">${c.name}</div>
     <div class="sec-meta">${items.length}개 이슈 · ${c.total}개 매체 집계</div></div></div>`;
  if(!items.length){ document.getElementById("list").innerHTML=`<div class="empty-msg">지금은 ${c.name}에서 여러 매체가 동시에 다루는 이슈가 없어요.</div>`; return; }
  document.getElementById("list").innerHTML=items.map((it,i)=>{
    const pct=Math.round(it.n/c.total*100);
    const dur=(it.firstH!=null&&it.lastH!=null)?it.firstH-it.lastH:null;
    const sp=sparkline(it.hours,it.firstH);
    const srcMore=it.n-Math.min(3,it.outlets.length);
    const srcline=it.outlets.slice(0,3).join(" · ")+(srcMore>0?` +${srcMore}`:"");
    const links=it.links.map(l=>`<a class="lk" href="${l[2]||'#'}" target="_blank" rel="noopener noreferrer"><span class="lsrc">${l[0]}</span><span class="lt">${l[1]}<span class="ext">↗ 원문</span></span></a>`).join("");
    return `<div class="issue-card" data-i="${i}">
      <div class="row">
        <div class="rank">${pad(i+1)}</div>
        <div class="rbody">
          <div class="title">${it.title}</div>
          <div class="metrics">
            <div class="cov-metric">
              <div class="cov-bar"><div class="cov-fill" style="width:${pct}%"></div></div>
              <div class="cov-num"><b>${it.n}</b><span>/ ${c.total} 매체가 동시 보도</span></div>
            </div>
            <div class="time-metric"><b>${fmtAgo(it.lastH)}</b> 최신<span class="td">·</span>${fmtDur(dur)} 지속</div>
          </div>
          <div class="srcline">${srcline}</div>
        </div>
        <div class="chev">›</div>
      </div>
      <div class="detail"><div class="detail-in">
        <div class="panel">
          <div class="panel-lbl"><span class="pl-no">01</span> 보도 흐름 · 언제 활발했나</div>
          <div class="act-wrap">
            <div class="act">${sp.bars}</div>
            <div class="act-axis"><span>${sp.window}시간 전</span><span>지금</span></div>
          </div>
          <div class="act-sum">${fmtAgo(it.firstH)} 시작 · <b>${it.n}개 매체</b>가 보도 · ${fmtAgo(it.lastH)} 최신</div>
        </div>
        <div class="panel">
          <div class="panel-lbl"><span class="pl-no">02</span> 매체별 원문 · 직접 확인</div>
          <div class="links">${links}</div>
        </div>
      </div></div>
    </div>`;
  }).join("");
  document.querySelectorAll(".issue-card").forEach(card=>{
    card.querySelector(".row").addEventListener("click",()=>card.classList.toggle("open"));
  });
}

async function load(){
  try{
    const res=await fetch("./data.json?t="+Date.now());
    if(!res.ok) throw new Error(res.status);
    DATA=await res.json();
    document.getElementById("clock").textContent=clockFromGen(DATA.generated);
    render(currentCat);
  }catch(e){
    document.getElementById("list").innerHTML=`<div class="empty-msg">데이터를 불러오지 못했어요. (${e.message})</div>`;
  }
}

document.getElementById("tabs").addEventListener("click",e=>{
  const b=e.target.closest(".tab"); if(!b)return; render(b.dataset.cat);
});
const update=document.getElementById("update");
update.addEventListener("click",async()=>{
  update.disabled=true; document.getElementById("upd-ico").outerHTML='<span class="sp" id="upd-ico">↻</span>';
  update.childNodes[1].textContent=" 갱신 중";
  await load();
  update.innerHTML='<span id="upd-ico">↻</span> 업데이트'; update.disabled=false;
});
const root=document.documentElement, saved=localStorage.getItem("sisa-theme");
if(saved)root.setAttribute("data-theme",saved);
document.getElementById("toggle").addEventListener("click",()=>{
  const next=root.getAttribute("data-theme")==="dark"?"light":"dark";
  root.setAttribute("data-theme",next); localStorage.setItem("sisa-theme",next);
});
load();
</script>
</body>
</html>
