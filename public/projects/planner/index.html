<!doctype html>
<html lang="ko" data-theme="dark">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>기획 캔버스</title>
<style>
:root{
  --bg:#14151a; --surface:#1b1d24; --surface2:#242730; --panel:#191b21;
  --fg:#eef0f4; --mut:#9a9ea9; --faint:#686c78;
  --line:rgba(255,255,255,.08); --line2:rgba(255,255,255,.15);
  --acc:#6a7cff; --acc-soft:rgba(106,124,255,.15); --acc-deep:#5563e6;
  --db:#2dbd8e; --db-soft:rgba(45,189,142,.14);
  --ok:#34c08a; --bad:#e2576a;
  --nborder:rgba(255,255,255,.26); --flow:#2bff88;
  --radius:12px; --mono:ui-monospace,'JetBrains Mono','SF Mono',Menlo,Consolas,monospace;
  --kfont:'Pretendard','Apple SD Gothic Neo','Malgun Gothic',-apple-system,BlinkMacSystemFont,system-ui,sans-serif;
  --dot:rgba(255,255,255,.05);
}
html[data-theme="light"]{
  --bg:#f5f6f8; --surface:#ffffff; --surface2:#eef0f4; --panel:#ffffff;
  --fg:#171a1f; --mut:#565b66; --faint:#8b909b;
  --line:rgba(0,0,0,.09); --line2:rgba(0,0,0,.15);
  --acc:#4f5ee6; --acc-soft:rgba(79,94,230,.10); --acc-deep:#3e4bcf;
  --db:#1a9e74; --db-soft:rgba(26,158,116,.12);
  --nborder:rgba(0,0,0,.24); --flow:#12c766;
  --dot:rgba(0,0,0,.05);
}
*{box-sizing:border-box;margin:0;padding:0}
[hidden]{display:none!important}
html,body{height:100%}
body{background:var(--bg);color:var(--fg);font-family:var(--kfont);-webkit-font-smoothing:antialiased;display:flex;flex-direction:column;overflow:hidden;height:100vh}
button,input,textarea,select{font-family:inherit;color:inherit}
button{cursor:pointer;border:none;background:none}
:focus-visible{outline:2px solid var(--acc);outline-offset:1px}
.ic{width:17px;height:17px;stroke:currentColor;stroke-width:2;fill:none;stroke-linecap:round;stroke-linejoin:round;flex:0 0 auto}

.top{flex:0 0 auto;display:flex;align-items:center;gap:12px;height:54px;padding:0 16px;background:var(--surface);border-bottom:1px solid var(--line2);z-index:6}
.back{display:inline-flex;align-items:center;gap:5px;font-size:13.5px;font-weight:600;color:var(--mut);padding:7px 10px;border-radius:8px;border:1px solid var(--line)}
.back:hover{color:var(--fg);border-color:var(--line2)}
.title{font-size:16px;font-weight:800;letter-spacing:-.01em}
.projname{font-size:14px;font-weight:700;color:var(--mut);padding-left:2px}
.spacer{margin-left:auto}
.sync{display:inline-flex;align-items:center;gap:6px;font-size:12px;color:var(--faint)}
.sync .dot{width:7px;height:7px;border-radius:50%;background:var(--faint)}.sync.ok .dot{background:var(--ok)}
.tbtn{display:inline-flex;align-items:center;gap:5px;font-size:12.5px;font-weight:600;color:var(--mut);border:1px solid var(--line2);border-radius:8px;padding:7px 10px}
.tbtn:hover{color:var(--fg);border-color:var(--acc)}.tbtn .ic{width:15px;height:15px}
.addbtn{display:inline-flex;align-items:center;gap:6px;font-size:13px;font-weight:700;color:#fff;border-radius:9px;padding:9px 12px}
.addbtn.pg{background:var(--acc)}.addbtn.pg:hover{background:var(--acc-deep)}
.addbtn.dbb{background:var(--db)}.addbtn.dbb:hover{filter:brightness(1.08)}
.addbtn .ic{width:15px;height:15px;stroke-width:2.4}
.themebtn{display:inline-flex;align-items:center;gap:6px;font-size:12.5px;font-weight:600;color:var(--mut);border:1px solid var(--line);border-radius:8px;padding:7px 10px}
.themebtn:hover{color:var(--fg);border-color:var(--line2)}

.body{flex:1;display:flex;min-height:0}

/* hub */
.hub{flex:1;overflow-y:auto;padding:40px clamp(20px,6vw,60px)}
.hubwrap{max-width:920px;margin:0 auto}
.hub-h{display:flex;align-items:baseline;gap:14px;margin-bottom:22px}
.hub-h h1{font-size:26px;font-weight:800;letter-spacing:-.02em}
.hub-h span{font-size:13px;color:var(--faint)}
.hub-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(230px,1fr));gap:14px}
.pcard{border:1px solid var(--line2);border-radius:13px;background:var(--surface);padding:18px;cursor:pointer;transition:.16s;position:relative}
.pcard:hover{border-color:var(--acc);transform:translateY(-2px);box-shadow:0 12px 26px -16px rgba(0,0,0,.7)}
.pcard.new{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;color:var(--acc);border-style:dashed;min-height:118px;font-weight:700}
.pcard.new .ic{width:22px;height:22px;stroke-width:2.2}
.pcard-name{font-size:16px;font-weight:700;margin-bottom:10px;word-break:break-word;padding-right:44px}
.pcard-meta{font-size:12px;color:var(--faint);font-family:var(--mono)}
.pcard-acts{position:absolute;top:14px;right:12px;display:flex;gap:4px;opacity:0;transition:.15s}
.pcard:hover .pcard-acts{opacity:1}
.pcard-acts button{width:26px;height:26px;border-radius:7px;color:var(--faint);display:inline-flex;align-items:center;justify-content:center}
.pcard-acts button:hover{background:var(--surface2);color:var(--fg)}.pcard-acts button.del:hover{color:var(--bad)}
.pcard-acts .ic{width:15px;height:15px}

/* canvas */
.stage{flex:1;position:relative;overflow:hidden;cursor:grab;background-image:radial-gradient(var(--dot) 1.3px,transparent 1.3px);background-size:26px 26px}
.stage.panning{cursor:grabbing}
.world{position:absolute;left:0;top:0;transform-origin:0 0;will-change:transform}
.edges{position:absolute;left:0;top:0;overflow:visible;pointer-events:none;width:1px;height:1px}
.ed-base{fill:none;stroke:var(--line2);stroke-width:1.5}
.ed-flow{fill:none;stroke:var(--flow);stroke-width:2.4;stroke-linecap:round;stroke-dasharray:2 4;animation:flow .5s linear infinite}
@keyframes flow{to{stroke-dashoffset:-12}}

.node{position:absolute;width:220px;background:var(--surface);border:1px solid var(--nc,var(--nborder));border-radius:11px;box-shadow:0 6px 18px -10px rgba(0,0,0,.6);user-select:none;cursor:grab;transition:box-shadow .15s,border-color .15s}
.node:hover{border-color:var(--nc,var(--acc))}
.node.db{border-color:var(--nc,var(--db))}.node.db:hover{border-color:var(--nc,var(--db))}
.node:active{cursor:grabbing}
.node-h{display:flex;align-items:center;gap:8px;padding:12px 13px 8px}
.node.db .node-h{padding-bottom:10px}
.node-h .dbic{width:16px;height:16px;color:var(--nc,var(--db));flex:0 0 auto}
.node-t{font-size:14.5px;font-weight:700;line-height:1.3;flex:1;min-width:0;word-break:break-word}
.node.db .node-t{font-family:var(--mono);font-size:13.5px}
.node-t.ph{color:var(--faint);font-weight:600}
.node-b{padding:2px 13px 12px}
.sqrow{display:flex;flex-wrap:wrap;gap:3px}
.sq{width:11px;height:11px;border-radius:3px;border:1.5px solid var(--line2)}
.sq.s-doing{background:var(--nc,var(--acc));border-color:var(--nc,var(--acc))}
.sq.s-done{background:var(--ok);border-color:var(--ok)}
.prbar{display:flex;gap:3px;flex:1}.prbar i{height:5px;flex:1;border-radius:3px;background:var(--line2)}.prbar i.on{background:var(--nc,var(--acc))}
.node-n{font-size:11px;color:var(--faint);font-family:var(--mono)}
.node-feat{font-size:10.5px;color:var(--ok);border:1px solid color-mix(in srgb,var(--ok) 45%,transparent);border-radius:20px;padding:1px 7px;font-weight:700}
.db-fields{border-top:1px solid var(--line);padding:4px 0 6px}
.dbf{display:flex;align-items:center;justify-content:space-between;gap:8px;padding:3px 13px;font-size:12px}
.dbf-n{color:var(--fg);font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;display:flex;align-items:center;gap:5px}
.dbf-n .pk{font-size:8.5px;font-weight:800;color:var(--nc,var(--db));border:1px solid color-mix(in srgb,var(--db) 50%,transparent);border-radius:3px;padding:0 3px}
.dbf-t{color:var(--faint);font-family:var(--mono);font-size:11px;flex:0 0 auto}
.dbf.more,.dbf.empt{color:var(--faint);font-size:11px;justify-content:flex-start}
.chandle{position:absolute;top:7px;bottom:7px;width:13px;cursor:crosshair;z-index:2}
.chandle.l{left:-6px}.chandle.r{right:-6px}
.chandle:hover::after{content:'';position:absolute;top:50%;transform:translateY(-50%);width:3px;height:22px;border-radius:3px;background:var(--nc,var(--acc))}
.chandle.l:hover::after{left:5px}.chandle.r:hover::after{right:5px}
.zoombtns{position:absolute;left:14px;bottom:14px;display:flex;gap:6px;z-index:4}
.zoombtns button{width:34px;height:34px;border-radius:8px;background:var(--surface);border:1px solid var(--line2);color:var(--mut);font-size:18px;display:flex;align-items:center;justify-content:center}
.zoombtns button:hover{color:var(--fg);border-color:var(--acc)}
.empty{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;color:var(--faint);text-align:center;padding:20px;pointer-events:none}
.empty h2{font-size:17px;font-weight:700;color:var(--mut)}.empty p{font-size:13.5px;max-width:380px;line-height:1.6}

/* context menu */
.emenu{position:fixed;z-index:50;background:var(--surface);border:1px solid var(--line2);border-radius:10px;padding:5px;box-shadow:0 12px 30px -8px rgba(0,0,0,.6);min-width:150px}
.emenu button{display:flex;align-items:center;width:100%;text-align:left;font-size:13px;font-weight:600;color:var(--fg);padding:8px 11px;border-radius:7px;gap:8px}
.emenu button:hover{background:var(--surface2)}.emenu button.del{color:var(--bad)}
.emenu-color{display:flex;align-items:center;gap:8px;padding:8px 11px;font-size:12.5px;color:var(--mut);border-bottom:1px solid var(--line);margin-bottom:3px}
.emenu-color .ncsw{width:22px;height:22px}
.emenu-color .ecreset{font-size:11px;font-weight:600;color:var(--faint);border:1px solid var(--line2);border-radius:6px;padding:4px 8px;margin-left:auto}
.emenu-color .ecreset:hover{color:var(--fg)}

/* detail */
.detail{flex:1;min-height:0;display:flex;flex-direction:column;background:var(--bg)}
.dhead{flex:0 0 auto;display:flex;align-items:center;gap:14px;padding:11px 20px;border-bottom:1px solid var(--line2);background:var(--surface)}
.dback{display:inline-flex;align-items:center;gap:5px;font-size:13.5px;font-weight:600;color:var(--mut);border:1px solid var(--line);border-radius:8px;padding:7px 11px}
.dback:hover{color:var(--fg);border-color:var(--acc)}
.dcrumb{font-size:14px;color:var(--faint)}.dcrumb b{color:var(--fg);font-weight:700}
.dbadge{font-size:10.5px;font-weight:800;letter-spacing:.05em;border-radius:5px;padding:2px 7px;font-family:var(--mono)}
.dbadge.pg{color:var(--acc);border:1px solid color-mix(in srgb,var(--acc) 45%,transparent)}
.dbadge.db{color:var(--db);border:1px solid color-mix(in srgb,var(--db) 45%,transparent)}
.dbody{flex:1;overflow-y:auto;padding:24px clamp(18px,5vw,44px) 80px}
.dwrap{max-width:720px;margin:0 auto}
.dtitle{width:100%;background:transparent;border:none;font-size:27px;font-weight:800;color:var(--fg);padding:2px 0 14px;border-bottom:1px solid var(--line);margin-bottom:12px}
.dtitle:focus{outline:none;border-color:var(--acc)}.dtitle::placeholder{color:var(--faint)}
.node-db-title{font-family:var(--mono);font-size:23px}
.ncrow{display:flex;align-items:center;gap:9px;font-size:12.5px;color:var(--mut);margin-bottom:16px}
.ncsw{width:24px;height:24px;border-radius:7px;border:1px solid var(--line2);position:relative;overflow:hidden;cursor:pointer;display:inline-block}
.ncsw input{position:absolute;inset:-4px;width:150%;height:150%;cursor:pointer;opacity:0}
.ncreset{font-size:11.5px;font-weight:600;color:var(--faint);border:1px solid var(--line2);border-radius:7px;padding:5px 9px}
.ncreset:hover{color:var(--fg);border-color:var(--acc)}
.dlinks{font-size:12.5px;color:var(--mut);margin-bottom:16px}
.dsub{font-size:12px;font-weight:800;letter-spacing:.05em;text-transform:uppercase;color:var(--faint);margin-bottom:12px}
.dsub .cnt{font-family:var(--mono);color:var(--acc)}

.feat{background:var(--surface);border:1px solid var(--line2);border-radius:11px;margin-bottom:9px;overflow:hidden}
.feat.dragging{opacity:.4}.feat.over{box-shadow:inset 0 2px 0 var(--acc)}
.fbh{display:flex;align-items:center;gap:9px;padding:11px 12px;cursor:pointer}
.feat-grip{color:var(--faint);cursor:grab;opacity:.5;display:inline-flex}.feat-grip:hover{opacity:1}.feat-grip .ic{width:15px;height:15px;stroke-width:1.8}
.feat-status{flex:0 0 auto;font-size:11px;font-weight:700;border-radius:20px;padding:3px 9px;border:1px solid var(--line2);color:var(--faint);white-space:nowrap}
.feat.status-doing .feat-status{color:#fff;background:var(--acc);border-color:var(--acc)}
.feat.status-done .feat-status{color:var(--ok);border-color:color-mix(in srgb,var(--ok) 50%,transparent)}
.feat-name{flex:1;min-width:0;background:transparent;border:none;font-size:15px;font-weight:700;color:var(--fg);cursor:text;padding:2px 0}
.feat-name:focus{outline:none}
.feat.status-done .feat-name{color:var(--faint);text-decoration:line-through}
.fb-prog{font-family:var(--mono);font-size:11px;color:var(--faint);flex:0 0 auto}
.fb-chev{flex:0 0 auto;color:var(--faint);display:inline-flex;transition:.18s}
.feat.open .fb-chev{transform:rotate(180deg);color:var(--acc)}
.feat-x{flex:0 0 auto;color:var(--faint);padding:3px;display:inline-flex}.feat-x:hover{color:var(--bad)}.feat-x .ic{width:15px;height:15px}
.fbb{padding:4px 13px 13px;border-top:1px solid var(--line)}
.fstep{margin-top:11px}
.fstep-h{display:flex;align-items:center;gap:8px;margin-bottom:5px}
.fstep-n{font-family:var(--mono);font-size:11px;font-weight:800;color:#fff;background:var(--acc);border-radius:5px;padding:2px 7px}
.fstep-l{font-size:12px;color:var(--faint)}
.fstep textarea{width:100%;min-height:52px;background:var(--surface2);border:1px solid var(--line);border-radius:9px;padding:9px 11px;font-size:13.5px;line-height:1.55;color:var(--fg);resize:vertical}
.fstep textarea:focus{outline:none;border-color:var(--acc)}.fstep textarea::placeholder{color:var(--faint)}

.fld{display:flex;align-items:center;gap:8px;background:var(--surface);border:1px solid var(--line2);border-radius:10px;padding:8px 10px;margin-bottom:7px}
.fld.dragging{opacity:.4}.fld.over{box-shadow:inset 0 2px 0 var(--db)}
.fld-pk{flex:0 0 auto;font-size:10px;font-weight:800;font-family:var(--mono);color:var(--faint);border:1px solid var(--line2);border-radius:5px;padding:3px 6px}
.fld-pk.on{color:#fff;background:var(--db);border-color:var(--db)}
.fld-name{flex:1.2;min-width:0;background:transparent;border:none;font-size:14px;font-weight:700;color:var(--fg);font-family:var(--mono);padding:2px 0}
.fld-name:focus{outline:none}
.fld-type{flex:1;min-width:0;background:var(--surface2);border:1px solid var(--line);border-radius:7px;font-size:12.5px;font-family:var(--mono);color:var(--mut);padding:6px 8px}
.fld-type:focus{outline:none;border-color:var(--db)}

.addfeat{width:100%;display:flex;align-items:center;justify-content:center;gap:7px;font-size:14px;font-weight:700;color:var(--acc);border:1.5px dashed var(--line2);border-radius:11px;padding:13px;margin-top:2px}
.addfeat:hover{border-color:var(--acc);background:var(--acc-soft)}.addfeat .ic{width:16px;height:16px;stroke-width:2.4}
.addfeat.dbadd{color:var(--db)}.addfeat.dbadd:hover{border-color:var(--db);background:var(--db-soft)}
.feat-empty{font-size:13.5px;color:var(--faint);padding:4px 2px 14px}
.dact{display:flex;gap:9px;margin-top:24px;padding-top:20px;border-top:1px solid var(--line)}
.pbtn{display:inline-flex;align-items:center;gap:6px;font-size:13px;font-weight:700;border-radius:9px;padding:10px 15px;border:1px solid var(--line2);color:var(--mut)}
.pbtn:hover{color:var(--fg);border-color:var(--acc)}.pbtn.danger:hover{color:var(--bad);border-color:var(--bad)}.pbtn .ic{width:15px;height:15px}

.toast{position:fixed;left:50%;bottom:22px;transform:translateX(-50%) translateY(10px);background:var(--fg);color:var(--bg);font-weight:700;font-size:13px;padding:9px 16px;border-radius:9px;opacity:0;pointer-events:none;transition:.25s;z-index:40}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
::-webkit-scrollbar{width:9px}::-webkit-scrollbar-thumb{background:var(--line2);border-radius:6px}
</style>
</head>
<body>
<header class="top">
  <a class="back" href="/">‹ 포털</a>
  <span class="title">기획 캔버스</span>
  <button class="tbtn" id="tohub" hidden>‹ 프로젝트</button>
  <span class="projname" id="projname" hidden></span>
  <div class="spacer"></div>
  <span class="sync" id="sync"><span class="dot"></span><span id="syncl">로컬</span></span>
  <button class="addbtn pg" id="addpage" hidden><svg class="ic" viewBox="0 0 24 24"><path d="M12 5v14M5 12h14"/></svg> 페이지</button>
  <button class="addbtn dbb" id="adddb" hidden><svg class="ic" viewBox="0 0 24 24"><ellipse cx="12" cy="5.5" rx="7" ry="2.6"/><path d="M5 5.5v13c0 1.5 3.1 2.6 7 2.6s7-1.1 7-2.6v-13M5 12c0 1.5 3.1 2.6 7 2.6s7-1.1 7-2.6"/></svg> DB</button>
  <button class="themebtn" id="tg"><svg class="ic" viewBox="0 0 24 24"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M2 12h2M20 12h2M5 5l1.5 1.5M17.5 17.5 19 19M19 5l-1.5 1.5M6.5 17.5 5 19"/></svg><span id="tgl">라이트</span></button>
</header>
<div class="body">
  <div class="hub" id="hub" hidden></div>
  <div class="stage" id="stage" hidden>
    <div class="world" id="world"><svg class="edges" id="edges"></svg></div>
    <div class="zoombtns"><button id="zin">+</button><button id="zout">−</button><button id="zfit" title="맞춤" style="font-size:12px">⤢</button></div>
    <div class="empty" id="empty" hidden></div>
  </div>
  <div class="detail" id="detail" hidden></div>
</div>
<div class="emenu" id="emenu" hidden></div>
<div class="toast" id="toast"></div>

<script>
const SUPA='https://ovnabmmofgujgefuamzn.supabase.co';
const ANON='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im92bmFibW1vZmd1amdlZnVhbXpuIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ5NzY1NDMsImV4cCI6MjA5MDU1MjU0M30.IvgT7eE_PfxRplHVkf2kXGw_sqGy07WNausqit3qskk';
const KV='planner';
function rpc(fn,body){return fetch(SUPA+'/rest/v1/rpc/'+fn,{method:'POST',headers:{apikey:ANON,Authorization:'Bearer '+ANON,'Content-Type':'application/json'},body:JSON.stringify(body)}).then(function(r){return r.ok?r.json():null;}).catch(function(){return null;});}

const NODE_W=220;
const PR_LABELS=['뼈대·핵심','기능 살 붙이기','디자인·상태','데이터·로직','예외·검증·마무리'];
const ST_ORDER=['todo','doing','done'], ST_L={todo:'예정',doing:'진행',done:'완료'};
const DB_TYPES=['uuid','text','varchar','int4','int8','numeric','float8','boolean','timestamptz','date','jsonb'];
function svg(p){return '<svg class="ic" viewBox="0 0 24 24">'+p+'</svg>';}
const P_GRIP='<path d="M8 7h8M8 12h8M8 17h8"/>', P_X='<path d="M6 6l12 12M18 6L6 18"/>', P_PLUS='<path d="M12 5v14M5 12h14"/>', P_CHEV='<path d="M5 9l7 7 7-7"/>', P_COPY='<rect x="9" y="9" width="11" height="11" rx="2"/><path d="M5 15V5a2 2 0 0 1 2-2h8"/>', P_TRASH='<path d="M4 7h16M9 7V5a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2M7 7l1 13h8l1-13"/>', P_PEN='<path d="M12 20h9M16.5 3.5a2.1 2.1 0 0 1 3 3L7 19l-4 1 1-4z"/>', P_DB='<ellipse cx="12" cy="5.5" rx="7" ry="2.6"/><path d="M5 5.5v13c0 1.5 3.1 2.6 7 2.6s7-1.1 7-2.6v-13M5 12c0 1.5 3.1 2.6 7 2.6s7-1.1 7-2.6"/>';
var uidC=0; function uid(){uidC++;return 'x'+Date.now().toString(36)+uidC.toString(36);}
function esc(t){return String(t==null?'':t).replace(/[&<>"]/g,function(c){return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c];});}

/* ---------- state ---------- */
const LKEY='planner_v1';
function blank(){return {projects:[],theme:'dark'};}
function normFeat(f){var st=ST_ORDER.indexOf(f.status)>=0?f.status:(f.done?'done':'todo');var had=Array.isArray(f.pr)&&f.pr.length;var pr=(Array.isArray(f.pr)?f.pr:[]).concat(['','','','','']).slice(0,5).map(function(s){return typeof s==='string'?s:'';});if(!had&&typeof f.desc==='string'&&f.desc.trim())pr[0]=f.desc;return {id:f.id||uid(),name:typeof f.name==='string'?f.name:'',status:st,pr:pr};}
function normField(f){return {id:f.id||uid(),name:typeof f.name==='string'?f.name:'',type:typeof f.type==='string'?f.type:'',pk:!!f.pk};}
function normNode(n){var type=n.type==='db'?'db':'page';return {id:n.id||uid(),type:type,title:typeof n.title==='string'?n.title:'',x:+n.x||0,y:+n.y||0,color:typeof n.color==='string'?n.color:'',features:Array.isArray(n.features)?n.features.map(normFeat):[],fields:Array.isArray(n.fields)?n.fields.map(normField):[]};}
function normProj(p){var nodes=Array.isArray(p.nodes)?p.nodes.map(normNode):[];var ids={};nodes.forEach(function(n){ids[n.id]=1;});var edges=(Array.isArray(p.edges)?p.edges:[]).filter(function(e){return e&&ids[e.from]&&ids[e.to]&&e.from!==e.to;}).map(function(e){return {id:e.id||uid(),from:e.from,to:e.to,dir:e.dir==='both'?'both':'to',color:typeof e.color==='string'?e.color:''};});var v=p.view||{};return {id:p.id||uid(),name:typeof p.name==='string'?p.name:'프로젝트',nodes:nodes,edges:edges,view:{panX:+v.panX||0,panY:+v.panY||0,scale:v.scale?Math.min(2,Math.max(.4,v.scale)):1}};}
function normalize(s){var o=blank();if(!s||typeof s!=='object')return o;o.theme=s.theme==='light'?'light':'dark';o.projects=Array.isArray(s.projects)?s.projects.map(normProj):[];return o;}
var state=normalize(function(){try{return JSON.parse(localStorage.getItem(LKEY));}catch(e){return null;}}());
var nav={level:'hub',nodeId:null}, cur=null, openSet={};
function proj(){return state.projects.find(function(p){return p.id===cur;})||null;}
function nodeById(id){var p=proj();return p?p.nodes.find(function(n){return n.id===id;}):null;}
function activeNode(){return nav.level==='node'?nodeById(nav.nodeId):null;}
function prFilled(f){return f.pr.filter(function(s){return s&&s.trim();}).length;}

/* ---------- persistence ---------- */
function saveLocal(){try{localStorage.setItem(LKEY,JSON.stringify(state));}catch(e){}}
var saveT=null,touched=false;
function setSync(ok){var el=document.getElementById('sync');el.className='sync '+(ok?'ok':'');document.getElementById('syncl').textContent=ok?'동기화됨':'로컬';}
function persist(){touched=true;saveLocal();clearTimeout(saveT);saveT=setTimeout(function(){rpc('kv_set',{p_k:KV,p_v:state}).then(function(r){if(r!==null)setSync(true);});},600);}
function loadRemote(){return rpc('kv_get',{p_k:KV}).then(function(r){if(touched){if(r!==null)setSync(true);return;}if(r&&typeof r==='object'&&Array.isArray(r.projects)){state=normalize(r);saveLocal();setSync(true);renderAll();}else if(r!==null){setSync(true);}});}

/* ---------- refs ---------- */
var hubEl=document.getElementById('hub'), stage=document.getElementById('stage'), world=document.getElementById('world'), edgesSvg=document.getElementById('edges'), detailEl=document.getElementById('detail'), emenuEl=document.getElementById('emenu');
function view(){return proj()?proj().view:{panX:0,panY:0,scale:1};}
function applyView(){var v=view();world.style.transform='translate('+v.panX+'px,'+v.panY+'px) scale('+v.scale+')';}
function s2w(sx,sy){var r=stage.getBoundingClientRect(),v=view();return {x:(sx-r.left-v.panX)/v.scale,y:(sy-r.top-v.panY)/v.scale};}

/* ---------- hub ---------- */
function renderHub(){var cards=state.projects.map(function(p){var pg=p.nodes.filter(function(n){return n.type!=='db';}).length,db=p.nodes.length-pg;return '<div class="pcard" data-open="'+p.id+'"><div class="pcard-acts"><button data-ren="'+p.id+'" title="이름">'+svg(P_PEN)+'</button><button class="del" data-del="'+p.id+'" title="삭제">'+svg(P_TRASH)+'</button></div><div class="pcard-name">'+esc(p.name)+'</div><div class="pcard-meta">페이지 '+pg+' · DB '+db+'</div></div>';}).join('');hubEl.innerHTML='<div class="hubwrap"><div class="hub-h"><h1>프로젝트</h1><span>기획을 시작할 프로젝트를 고르세요</span></div><div class="hub-grid"><div class="pcard new" data-newproj>'+svg(P_PLUS)+'새 프로젝트</div>'+cards+'</div></div>';}

/* ---------- canvas ---------- */
function nodeHTML(n){
  var cstyle='left:'+n.x+'px;top:'+n.y+'px'+(n.color?';--nc:'+n.color:'');
  var handles='<div class="chandle l" data-port></div><div class="chandle r" data-port></div>';
  if(n.type==='db'){var fs=n.fields||[];var rows=fs.slice(0,6).map(function(f){return '<div class="dbf"><span class="dbf-n">'+(f.pk?'<span class="pk">PK</span>':'')+esc(f.name||'field')+'</span><span class="dbf-t">'+esc(f.type||'')+'</span></div>';}).join('');var more=fs.length>6?'<div class="dbf more">+'+(fs.length-6)+' 더</div>':'';
    return '<div class="node db" data-id="'+n.id+'" style="'+cstyle+'"><div class="node-h"><span class="dbic">'+svg(P_DB)+'</span><span class="node-t'+(n.title?'':' ph')+'">'+esc(n.title||'table')+'</span></div><div class="db-fields">'+(rows||'<div class="dbf empt">필드 없음</div>')+more+'</div>'+handles+'</div>';}
  var sq=n.features.map(function(f){return '<i class="sq s-'+f.status+'"></i>';}).join('');
  var nb=n.features.length?'<div class="node-b"><div class="sqrow">'+sq+'</div></div>':'';
  return '<div class="node" data-id="'+n.id+'" style="'+cstyle+'"><div class="node-h"><span class="node-t'+(n.title?'':' ph')+'">'+esc(n.title||'제목 없음')+'</span></div>'+nb+handles+'</div>';
}
function nodeGeom(n){var el=world.querySelector('.node[data-id="'+n.id+'"]');var h=el?el.offsetHeight:72;return {x:n.x,y:n.y,w:NODE_W,h:h,cx:n.x+NODE_W/2,cy:n.y+h/2};}
function edgeGeo(a,b){var A=nodeGeom(a),B=nodeGeom(b);var dx=B.cx-A.cx,dy=B.cy-A.cy;var ax,ay,bx,by,full,h1,h2,segs,ccx,ccy;
  if(Math.abs(dx)>=Math.abs(dy)){
    ax=dx>=0?A.x+A.w:A.x; ay=A.cy; bx=dx>=0?B.x:B.x+B.w; by=B.cy; var mx=(ax+bx)/2; ccx=mx; ccy=(ay+by)/2;
    full='M '+ax+' '+ay+' L '+mx+' '+ay+' L '+mx+' '+by+' L '+bx+' '+by;
    h1='M '+mx+' '+ccy+' L '+mx+' '+ay+' L '+ax+' '+ay;
    h2='M '+mx+' '+ccy+' L '+mx+' '+by+' L '+bx+' '+by;
    segs=[[ax,ay,mx,ay],[mx,ay,mx,by],[mx,by,bx,by]];
    var len=Math.abs(mx-ax)+Math.abs(by-ay)+Math.abs(bx-mx),l1=Math.abs(ccy-ay)+Math.abs(ax-mx),l2=Math.abs(by-ccy)+Math.abs(bx-mx);
    return {ax:ax,ay:ay,bx:bx,by:by,cx:ccx,cy:ccy,full:full,h1:h1,h2:h2,segs:segs,len:len,l1:l1,l2:l2};
  } else {
    ay=dy>=0?A.y+A.h:A.y; ax=A.cx; by=dy>=0?B.y:B.y+B.h; bx=B.cx; var my=(ay+by)/2; ccx=(ax+bx)/2; ccy=my;
    full='M '+ax+' '+ay+' L '+ax+' '+my+' L '+bx+' '+my+' L '+bx+' '+by;
    h1='M '+ccx+' '+my+' L '+ax+' '+my+' L '+ax+' '+ay;
    h2='M '+ccx+' '+my+' L '+bx+' '+my+' L '+bx+' '+by;
    segs=[[ax,ay,ax,my],[ax,my,bx,my],[bx,my,bx,by]];
    var lenv=Math.abs(my-ay)+Math.abs(bx-ax)+Math.abs(by-my),l1v=Math.abs(ax-ccx)+Math.abs(ay-my),l2v=Math.abs(bx-ccx)+Math.abs(by-my);
    return {ax:ax,ay:ay,bx:bx,by:by,cx:ccx,cy:ccy,full:full,h1:h1,h2:h2,segs:segs,len:lenv,l1:l1v,l2:l2v};
  }}
function drawEdges(tmp,simple){var p=proj(),g='';
  if(p)p.edges.forEach(function(e){var a=nodeById(e.from),b=nodeById(e.to);if(!a||!b)return;var q=edgeGeo(a,b);var st=e.color?' style="stroke:'+e.color+'"':'';
    g+='<path class="ed-base" d="'+q.full+'"></path>';
    if(!simple){g+='<path class="ed-flow"'+st+' d="'+q.h1+'"></path><path class="ed-flow"'+st+' d="'+q.h2+'"></path>';}
  });
  if(tmp)g+='<path class="ed-base" style="stroke:var(--flow)" d="'+tmp+'"></path>';
  edgesSvg.innerHTML=g;}
function renderCanvas(){var p=proj(),em=document.getElementById('empty');world.querySelectorAll('.node').forEach(function(n){n.remove();});
  if(!p){drawEdges();return;}
  if(!p.nodes.length){em.hidden=false;em.innerHTML='<h2>빈 캔버스</h2><p>우상단 <b>＋ 페이지</b> 또는 <b>＋ DB</b>로 노드를 추가하고, 노드의 좌/우 가장자리를 끌어 연결하세요. 노드를 클릭하면 안으로 들어가 설계합니다.</p>';}else em.hidden=true;
  var frag=document.createElement('div');frag.innerHTML=p.nodes.map(nodeHTML).join('');while(frag.firstChild)world.appendChild(frag.firstChild);drawEdges();}

/* ---------- node detail ---------- */
function featBlock(f){var open=!!openSet[f.id],filled=prFilled(f);var head='<div class="fbh" data-fhead><span class="feat-grip" data-grip>'+svg(P_GRIP)+'</span><button class="feat-status" data-fstatus title="상태">'+ST_L[f.status]+'</button><input class="feat-name" data-fname value="'+esc(f.name)+'" placeholder="기능 이름"><span class="fb-prog">'+filled+'/5</span><span class="fb-chev">'+svg(P_CHEV)+'</span><button class="feat-x" data-fdel title="삭제">'+svg(P_X)+'</button></div>';var body='';if(open){var s='';for(var i=0;i<5;i++)s+='<div class="fstep"><div class="fstep-h"><span class="fstep-n">PR'+(i+1)+'</span><span class="fstep-l">'+PR_LABELS[i]+'</span></div><textarea data-pr="'+i+'" placeholder="이 단계에서 구현할 것">'+esc(f.pr[i])+'</textarea></div>';body='<div class="fbb">'+s+'</div>';}return '<div class="feat'+(open?' open':'')+' status-'+f.status+'" data-fid="'+f.id+'" draggable="true">'+head+body+'</div>';}
function fieldRow(f){return '<div class="fld" data-fid="'+f.id+'" draggable="true"><span class="feat-grip" data-grip>'+svg(P_GRIP)+'</span><button class="fld-pk'+(f.pk?' on':'')+'" data-fpk title="기본키">PK</button><input class="fld-name" data-fname value="'+esc(f.name)+'" placeholder="필드명"><input class="fld-type" data-ftype value="'+esc(f.type)+'" placeholder="타입" list="dbtypes"><button class="feat-x" data-fdel title="삭제">'+svg(P_X)+'</button></div>';}
function renderDetail(){
  var n=activeNode(),p=proj();if(!n){nav={level:'canvas',nodeId:null};renderAll();return;}
  var links=p.edges.filter(function(e){return e.from===n.id||e.to===n.id;}).map(function(e){var o=nodeById(e.from===n.id?e.to:e.from);var d=e.dir==='both'?'↔ ':(e.from===n.id?'→ ':'← ');return d+esc(o?o.title||'제목 없음':'?');}).join('  ·  ');
  var isDB=n.type==='db';var badge='<span class="dbadge '+(isDB?'db">DB':'pg">PAGE')+'</span>';var content;
  if(isDB){var rows=(n.fields.length?'<div id="featlist">'+n.fields.map(fieldRow).join('')+'</div>':'<div class="feat-empty">필드가 없습니다. 이 테이블에 담을 데이터 필드를 추가하세요.</div>');content='<div class="dsub">필드 <span class="cnt" style="color:var(--db)">'+n.fields.length+'</span></div>'+rows+'<button class="addfeat dbadd" data-addfield>'+svg(P_PLUS)+' 필드 추가</button><datalist id="dbtypes">'+DB_TYPES.map(function(t){return '<option value="'+t+'">';}).join('')+'</datalist>';}
  else{var done=n.features.filter(function(f){return f.status==='done';}).length;var list=n.features.length?'<div id="featlist">'+n.features.map(featBlock).join('')+'</div>':'<div class="feat-empty">아직 기능이 없습니다. 기능을 추가하면 블록이 열리고, 그 안에서 PR 1~5로 구현을 설계합니다.</div>';content='<div class="dsub">기능 <span class="cnt">'+n.features.length+(done?' · '+done+' 완료':'')+'</span></div>'+list+'<button class="addfeat" data-addfeat>'+svg(P_PLUS)+' 기능 추가</button>';}
  var swColor=n.color||(isDB?'#2dbd8e':'#6a7cff');
  detailEl.innerHTML='<div class="dhead"><button class="dback" data-back>‹ 캔버스</button>'+badge+'<div class="dcrumb">'+esc(p.name)+' › <b>'+esc(n.title||'제목 없음')+'</b></div></div>'
    +'<div class="dbody"><div class="dwrap">'
    +'<input class="dtitle'+(isDB?' node-db-title':'')+'" data-title value="'+esc(n.title)+'" placeholder="'+(isDB?'table_name':'페이지 이름')+'">'
    +'<div class="ncrow"><span>테두리 색</span><label class="ncsw" style="background:'+esc(swColor)+'"><input type="color" data-ncolor value="'+esc(swColor)+'"></label><button class="ncreset" data-ncreset>기본</button></div>'
    +(links?'<div class="dlinks">연결 &nbsp;'+links+'</div>':'')
    +content
    +'<div class="dact"><button class="pbtn" data-copy>'+svg(P_COPY)+' '+(isDB?'스키마 복사':'프롬프트 복사')+'</button><button class="pbtn danger" data-delnode>'+svg(P_TRASH)+' '+(isDB?'테이블':'페이지')+' 삭제</button></div>'
    +'</div></div>';
}
function updateTop(){var onCanvas=nav.level==='canvas';document.getElementById('tohub').hidden=!onCanvas;document.getElementById('projname').hidden=!onCanvas;document.getElementById('addpage').hidden=!onCanvas;document.getElementById('adddb').hidden=!onCanvas;if(onCanvas&&proj())document.getElementById('projname').textContent=proj().name;}
function renderAll(){document.documentElement.setAttribute('data-theme',state.theme);document.getElementById('tgl').textContent=state.theme==='dark'?'라이트':'다크';updateTop();hubEl.hidden=nav.level!=='hub';stage.hidden=nav.level!=='canvas';detailEl.hidden=nav.level!=='node';if(nav.level==='hub')renderHub();else if(nav.level==='canvas'){applyView();renderCanvas();}else renderDetail();}

/* ---------- ops ---------- */
function openProject(id){cur=id;nav={level:'canvas',nodeId:null};renderAll();}
function addNode(type){var p=proj();if(!p)return;var r=stage.getBoundingClientRect(),v=p.view;var cx=(r.width/2-v.panX)/v.scale-110,cy=(r.height/2-v.panY)/v.scale-30;var n=normNode({type:type,x:Math.round(cx+(p.nodes.length%5)*20),y:Math.round(cy+(p.nodes.length%5)*20)});p.nodes.push(n);persist();nav={level:'node',nodeId:n.id};renderAll();setTimeout(function(){var t=document.querySelector('.dtitle');if(t)t.focus();},30);}
function delNode(id){var p=proj();if(!p)return;p.nodes=p.nodes.filter(function(n){return n.id!==id;});p.edges=p.edges.filter(function(e){return e.from!==id&&e.to!==id;});persist();nav={level:'canvas',nodeId:null};renderAll();}
function addEdge(from,to){var p=proj();if(!p||from===to)return;if(p.edges.some(function(e){return (e.from===from&&e.to===to)||(e.from===to&&e.to===from);}))return;p.edges.push({id:uid(),from:from,to:to,dir:'to'});persist();drawEdges();}
function openNode(id){nav={level:'node',nodeId:id};renderAll();}
function newProject(){var name=prompt('새 프로젝트 이름','새 프로젝트');if(name==null)return;var p=normProj({name:name.trim()||'새 프로젝트'});state.projects.push(p);persist();openProject(p.id);}
function renameProject(id){var p=state.projects.find(function(x){return x.id===id;});if(!p)return;var name=prompt('프로젝트 이름',p.name);if(name==null)return;p.name=name.trim()||p.name;persist();renderAll();}
function delProject(id){var p=state.projects.find(function(x){return x.id===id;});if(!p)return;if(!confirm('“'+p.name+'” 프로젝트를 삭제할까요?'))return;state.projects=state.projects.filter(function(x){return x.id!==id;});persist();renderHub();}
var toastT=null;function toast(m){var t=document.getElementById('toast');t.textContent=m;t.classList.add('show');clearTimeout(toastT);toastT=setTimeout(function(){t.classList.remove('show');},1500);}
function itemOf(el){var n=activeNode();if(!n)return null;var row=el.closest('.feat,.fld');if(!row)return null;var id=row.getAttribute('data-fid');var arr=n.type==='db'?n.fields:n.features;return arr.find(function(x){return x.id===id;});}

/* ---------- hub / topbar events ---------- */
hubEl.addEventListener('click',function(e){if(e.target.closest('[data-newproj]')){newProject();return;}var ren=e.target.closest('[data-ren]');if(ren){renameProject(ren.getAttribute('data-ren'));return;}var del=e.target.closest('[data-del]');if(del){delProject(del.getAttribute('data-del'));return;}var op=e.target.closest('[data-open]');if(op){openProject(op.getAttribute('data-open'));return;}});
document.getElementById('tohub').onclick=function(){nav={level:'hub',nodeId:null};cur=null;renderAll();};
document.getElementById('addpage').onclick=function(){addNode('page');};
document.getElementById('adddb').onclick=function(){addNode('db');};
document.getElementById('tg').onclick=function(){state.theme=state.theme==='dark'?'light':'dark';persist();renderAll();};

/* ---------- detail events ---------- */
detailEl.addEventListener('click',function(e){
  if(e.target.closest('[data-back]')){nav={level:'canvas',nodeId:null};renderAll();return;}
  var n=activeNode();if(!n)return;
  if(e.target.closest('[data-ncreset]')){n.color='';persist();renderDetail();return;}
  if(e.target.closest('[data-delnode]')){if(confirm('삭제할까요?'))delNode(n.id);return;}
  if(e.target.closest('[data-copy]')){copyNode(n);return;}
  if(e.target.closest('[data-addfeat]')){var nf=normFeat({});n.features.push(nf);openSet[nf.id]=true;persist();renderDetail();var ins=detailEl.querySelectorAll('.feat-name');if(ins.length)ins[ins.length-1].focus();return;}
  if(e.target.closest('[data-addfield]')){n.fields.push(normField({}));persist();renderDetail();var ins2=detailEl.querySelectorAll('.fld-name');if(ins2.length)ins2[ins2.length-1].focus();return;}
  var fs=e.target.closest('[data-fstatus]');if(fs){var f=itemOf(fs);if(f){f.status=ST_ORDER[(ST_ORDER.indexOf(f.status)+1)%3];persist();renderDetail();}return;}
  var pk=e.target.closest('[data-fpk]');if(pk){var f2=itemOf(pk);if(f2){f2.pk=!f2.pk;persist();renderDetail();}return;}
  var fd=e.target.closest('[data-fdel]');if(fd){var f3=itemOf(fd);if(f3){if(f3.id&&openSet[f3.id])delete openSet[f3.id];var an=n.type==='db'?'fields':'features';n[an]=n[an].filter(function(x){return x.id!==f3.id;});persist();renderDetail();}return;}
  var head=e.target.closest('[data-fhead]');
  if(head&&!e.target.closest('input,[data-fstatus],[data-fdel],[data-grip]')){var f4=itemOf(head);if(f4){openSet[f4.id]=!openSet[f4.id];renderDetail();}return;}
});
detailEl.addEventListener('input',function(e){var n=activeNode();if(!n)return;
  if(e.target.matches('[data-title]')){n.title=e.target.value;var c=detailEl.querySelector('.dcrumb b');if(c)c.textContent=n.title||'제목 없음';persist();}
  else if(e.target.matches('[data-ncolor]')){n.color=e.target.value;var sw=detailEl.querySelector('.ncsw');if(sw)sw.style.background=n.color;persist();}
  else if(e.target.matches('[data-fname]')){var f=itemOf(e.target);if(f){f.name=e.target.value;persist();}}
  else if(e.target.matches('[data-ftype]')){var f2=itemOf(e.target);if(f2){f2.type=e.target.value;persist();}}
  else if(e.target.matches('[data-pr]')){var f3=itemOf(e.target);if(f3){f3.pr[+e.target.getAttribute('data-pr')]=e.target.value;var pgel=e.target.closest('.feat').querySelector('.fb-prog');if(pgel)pgel.textContent=prFilled(f3)+'/5';persist();}}
});
function copyNode(n){var out;if(n.type==='db'){out='create table '+(n.title||'table')+' (\n'+n.fields.map(function(f){return '  '+(f.name||'col')+' '+(f.type||'text')+(f.pk?' primary key':'');}).join(',\n')+'\n);';}else{out='# '+(n.title||'제목 없음')+'\n';n.features.forEach(function(f){out+='\n## 기능 — '+(f.name||'(무제)')+'  ['+ST_L[f.status]+']\n';for(var i=0;i<5;i++)if(f.pr[i]&&f.pr[i].trim())out+='### PR'+(i+1)+' · '+PR_LABELS[i]+'\n'+f.pr[i]+'\n';});}(navigator.clipboard?navigator.clipboard.writeText(out):Promise.reject()).then(function(){toast('복사됨');},function(){toast('복사 실패');});}

/* item drag reorder */
var fdrag=null;
detailEl.addEventListener('dragstart',function(e){var row=e.target.closest('.feat,.fld');if(!row)return;if(e.target.matches('input,textarea')){e.preventDefault();return;}fdrag=row.getAttribute('data-fid');row.classList.add('dragging');e.dataTransfer.effectAllowed='move';try{e.dataTransfer.setData('text/plain',fdrag);}catch(_){}});
detailEl.addEventListener('dragend',function(){var d=detailEl.querySelector('.dragging');if(d)d.classList.remove('dragging');detailEl.querySelectorAll('.over').forEach(function(x){x.classList.remove('over');});fdrag=null;});
detailEl.addEventListener('dragover',function(e){if(!fdrag)return;var list=detailEl.querySelector('#featlist');if(!list)return;e.preventDefault();detailEl.querySelectorAll('.over').forEach(function(x){x.classList.remove('over');});var rows=[].slice.call(list.querySelectorAll('.feat:not(.dragging),.fld:not(.dragging)'));for(var i=0;i<rows.length;i++){var r=rows[i].getBoundingClientRect();if(e.clientY<r.top+r.height/2){rows[i].classList.add('over');return;}}});
detailEl.addEventListener('drop',function(e){if(!fdrag)return;var list=detailEl.querySelector('#featlist');if(!list)return;e.preventDefault();var n=activeNode();if(!n)return;var arr=n.type==='db'?n.fields:n.features;var rows=[].slice.call(list.querySelectorAll('.feat:not(.dragging),.fld:not(.dragging)'));var beforeId=null;for(var i=0;i<rows.length;i++){var r=rows[i].getBoundingClientRect();if(e.clientY<r.top+r.height/2){beforeId=rows[i].getAttribute('data-fid');break;}}var idx=arr.findIndex(function(f){return f.id===fdrag;});if(idx<0)return;var moved=arr.splice(idx,1)[0];var bi=beforeId?arr.findIndex(function(f){return f.id===beforeId;}):arr.length;arr.splice(bi<0?arr.length:bi,0,moved);persist();renderDetail();});

/* ---------- edge context menu (right-click) ---------- */
function distSeg(px,py,x1,y1,x2,y2){var dx=x2-x1,dy=y2-y1,l2=dx*dx+dy*dy;if(l2===0)return Math.hypot(px-x1,py-y1);var t=Math.max(0,Math.min(1,((px-x1)*dx+(py-y1)*dy)/l2));return Math.hypot(px-(x1+t*dx),py-(y1+t*dy));}
function nearestEdge(wx,wy,thr){var p=proj();if(!p)return null;var best=null,bd=thr;p.edges.forEach(function(e){var a=nodeById(e.from),b=nodeById(e.to);if(!a||!b)return;var q=edgeGeo(a,b);q.segs.forEach(function(s){var d=distSeg(wx,wy,s[0],s[1],s[2],s[3]);if(d<bd){bd=d;best=e;}});});return best;}
function showEmenu(x,y,edge){var c=edge.color||'#2bff88';emenuEl.innerHTML='<div class="emenu-color"><span>선 색상</span><label class="ncsw" style="background:'+esc(c)+'"><input type="color" data-ecolor value="'+esc(c)+'"></label><button class="ecreset" data-op="ecreset">기본</button></div><button data-op="del" class="del">'+svg(P_TRASH)+' 연결 삭제</button>';emenuEl.style.left=Math.min(x,window.innerWidth-180)+'px';emenuEl.style.top=Math.min(y,window.innerHeight-140)+'px';emenuEl.hidden=false;emenuEl.dataset.eid=edge.id;}
function hideEmenu(){emenuEl.hidden=true;}
stage.addEventListener('contextmenu',function(e){var w=s2w(e.clientX,e.clientY);var edge=nearestEdge(w.x,w.y,10/view().scale);if(!edge)return;e.preventDefault();showEmenu(e.clientX,e.clientY,edge);});
emenuEl.addEventListener('click',function(e){var b=e.target.closest('[data-op]');if(!b)return;var p=proj();var edge=p&&p.edges.find(function(x){return x.id===emenuEl.dataset.eid;});if(!edge){hideEmenu();return;}var op=b.getAttribute('data-op');
  if(op==='ecreset'){edge.color='';persist();drawEdges();var sw=emenuEl.querySelector('.ncsw'),ci=emenuEl.querySelector('[data-ecolor]');if(sw)sw.style.background='#2bff88';if(ci)ci.value='#2bff88';return;}
  if(op==='del'){p.edges=p.edges.filter(function(x){return x.id!==edge.id;});}
  persist();drawEdges();hideEmenu();});
emenuEl.addEventListener('input',function(e){if(!e.target.matches('[data-ecolor]'))return;var p=proj();var edge=p&&p.edges.find(function(x){return x.id===emenuEl.dataset.eid;});if(edge){edge.color=e.target.value;var sw=emenuEl.querySelector('.ncsw');if(sw)sw.style.background=e.target.value;persist();drawEdges();}});
document.addEventListener('mousedown',function(e){if(!emenuEl.hidden&&!e.target.closest('#emenu'))hideEmenu();});

/* ---------- canvas events ---------- */
var drag=null;
stage.addEventListener('mousedown',function(e){
  if(e.button!==0)return;
  var port=e.target.closest('[data-port]');if(port){drag={mode:'link',from:port.closest('.node').getAttribute('data-id')};e.preventDefault();return;}
  var node=e.target.closest('.node');if(node){var id=node.getAttribute('data-id'),nn=nodeById(id),w=s2w(e.clientX,e.clientY);drag={mode:'node',id:id,dx:w.x-nn.x,dy:w.y-nn.y,sx:e.clientX,sy:e.clientY,moved:false};e.preventDefault();return;}
  var v=view();drag={mode:'pan',sx:e.clientX,sy:e.clientY,px:v.panX,py:v.panY};stage.classList.add('panning');
});
window.addEventListener('mousemove',function(e){if(!drag)return;
  if(drag.mode==='pan'){var v=view();v.panX=drag.px+(e.clientX-drag.sx);v.panY=drag.py+(e.clientY-drag.sy);applyView();}
  else if(drag.mode==='node'){if(!drag.moved&&Math.abs(e.clientX-drag.sx)+Math.abs(e.clientY-drag.sy)<4)return;drag.moved=true;var nn=nodeById(drag.id);if(!nn)return;var w=s2w(e.clientX,e.clientY);nn.x=Math.round(w.x-drag.dx);nn.y=Math.round(w.y-drag.dy);var el=document.querySelector('.node[data-id="'+drag.id+'"]');if(el){el.style.left=nn.x+'px';el.style.top=nn.y+'px';}drawEdges(null,true);}
  else if(drag.mode==='link'){var a=nodeById(drag.from);if(!a)return;var G=nodeGeom(a);var w=s2w(e.clientX,e.clientY);var dx=w.x-G.cx,dy=w.y-G.cy,d;if(Math.abs(dx)>=Math.abs(dy)){var ax=dx>=0?G.x+G.w:G.x,ay=G.cy,mx=(ax+w.x)/2;d='M '+ax+' '+ay+' L '+mx+' '+ay+' L '+mx+' '+w.y+' L '+w.x+' '+w.y;}else{var ay2=dy>=0?G.y+G.h:G.y,ax2=G.cx,my=(ay2+w.y)/2;d='M '+ax2+' '+ay2+' L '+ax2+' '+my+' L '+w.x+' '+my+' L '+w.x+' '+w.y;}drawEdges(d,true);}
});
window.addEventListener('mouseup',function(e){if(!drag)return;
  if(drag.mode==='pan'){stage.classList.remove('panning');persist();}
  else if(drag.mode==='node'){if(drag.moved){persist();drawEdges();}else openNode(drag.id);}
  else if(drag.mode==='link'){var tgt=document.elementFromPoint(e.clientX,e.clientY),nd=tgt&&tgt.closest?tgt.closest('.node'):null;if(nd)addEdge(drag.from,nd.getAttribute('data-id'));drawEdges();}
  drag=null;
});
function zoomAt(cx,cy,factor){var p=proj();if(!p)return;var v=p.view,ns=Math.min(2,Math.max(.4,v.scale*factor)),r=stage.getBoundingClientRect(),wx=(cx-r.left-v.panX)/v.scale,wy=(cy-r.top-v.panY)/v.scale;v.scale=ns;v.panX=cx-r.left-wx*ns;v.panY=cy-r.top-wy*ns;applyView();persist();}
stage.addEventListener('wheel',function(e){if(!proj())return;e.preventDefault();zoomAt(e.clientX,e.clientY,e.deltaY<0?1.1:0.9);},{passive:false});
document.getElementById('zin').onclick=function(){var r=stage.getBoundingClientRect();zoomAt(r.left+r.width/2,r.top+r.height/2,1.2);};
document.getElementById('zout').onclick=function(){var r=stage.getBoundingClientRect();zoomAt(r.left+r.width/2,r.top+r.height/2,0.83);};
document.getElementById('zfit').onclick=function(){var p=proj();if(!p||!p.nodes.length)return;var a=1e9,b=1e9,c=-1e9,d=-1e9;p.nodes.forEach(function(n){var G=nodeGeom(n);a=Math.min(a,G.x);b=Math.min(b,G.y);c=Math.max(c,G.x+G.w);d=Math.max(d,G.y+G.h);});var r=stage.getBoundingClientRect(),sc=Math.min(2,Math.max(.4,Math.min((r.width-90)/(c-a||1),(r.height-90)/(d-b||1))));p.view.scale=sc;p.view.panX=(r.width-(c-a)*sc)/2-a*sc;p.view.panY=(r.height-(d-b)*sc)/2-b*sc;applyView();persist();};

renderAll();
loadRemote();
</script>
