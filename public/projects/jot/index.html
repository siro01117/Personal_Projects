<!doctype html>
<html lang="ko" data-theme="dark">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>잡기장</title>
<style>
:root{
  --bg:#15171c; --surface:#1c1f26; --surface2:#262a33;
  --fg:#f1f2f5; --mut:#9a9ea9; --faint:#6b6f7a;
  --line:rgba(255,255,255,.08); --line2:rgba(255,255,255,.14);
  --acc:#2f7bff; --acc-soft:rgba(47,123,255,.14); --acc-deep:#1f63e0;
  --ok:#34c08a; --bad:#e2576a;
  --radius:12px; --mono:ui-monospace,'JetBrains Mono','SF Mono',Menlo,Consolas,monospace;
  --kfont:'Pretendard','Apple SD Gothic Neo','Malgun Gothic',-apple-system,BlinkMacSystemFont,system-ui,sans-serif;
}
html[data-theme="light"]{
  --bg:#fbfbfc; --surface:#ffffff; --surface2:#f0f2f5;
  --fg:#15171c; --mut:#565b66; --faint:#878c96;
  --line:rgba(0,0,0,.09); --line2:rgba(0,0,0,.15);
  --acc:#2563eb; --acc-soft:rgba(37,99,235,.10); --acc-deep:#1d4ed8;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{background:var(--bg);color:var(--fg);font-family:var(--kfont);-webkit-font-smoothing:antialiased;
  display:flex;flex-direction:column;overflow:hidden;transition:background .2s,color .2s}
button,input{font-family:inherit;color:inherit}
button{cursor:pointer;border:none;background:none}
:focus-visible{outline:2px solid var(--acc);outline-offset:2px;border-radius:6px}
.ic{width:18px;height:18px;stroke:currentColor;stroke-width:2;fill:none;stroke-linecap:round;stroke-linejoin:round;flex:0 0 auto}

/* appbar */
.appbar{flex:0 0 auto;display:flex;align-items:center;gap:16px;height:58px;padding:0 20px;border-bottom:1px solid var(--line2);background:var(--surface)}
.back{display:inline-flex;align-items:center;gap:6px;font-size:14px;font-weight:600;color:var(--mut);padding:8px 11px;border-radius:8px;border:1px solid var(--line)}
.back:hover{color:var(--fg);border-color:var(--line2)}
.title{font-size:18px;font-weight:800;letter-spacing:-.02em}
.tabs{display:flex;gap:3px;margin-left:8px;background:var(--surface2);border:1px solid var(--line);border-radius:11px;padding:3px}
.tab{display:inline-flex;align-items:center;gap:7px;font-size:13.5px;font-weight:700;letter-spacing:.02em;color:var(--mut);padding:8px 14px;border-radius:8px;transition:.12s;font-family:var(--mono)}
.tab:hover{color:var(--fg)}
.tab.on{background:var(--acc);color:#fff}
.tab .cnt{font-size:11px;font-weight:700;opacity:.8;font-variant-numeric:tabular-nums}
.tab.all{font-family:var(--kfont);letter-spacing:0}
.spacer{margin-left:auto}
.sync{display:inline-flex;align-items:center;gap:6px;font-size:12px;color:var(--faint)}
.sync .dot{width:7px;height:7px;border-radius:50%;background:var(--faint)}
.sync.ok .dot{background:var(--ok)} .sync.off .dot{background:var(--faint)}
.themebtn{display:inline-flex;align-items:center;gap:7px;font-size:13px;font-weight:600;color:var(--mut);padding:8px 12px;border-radius:8px;border:1px solid var(--line)}
.themebtn:hover{color:var(--fg);border-color:var(--line2)}

/* stage */
.stage{flex:1;min-height:0;overflow:hidden}
.stage.board{display:grid;grid-template-columns:repeat(4,1fr)}
.stage.focus{display:flex;justify-content:center;overflow-y:auto}

/* zone */
.zone{display:flex;flex-direction:column;min-height:0;min-width:0;background:var(--surface);border-right:1px solid var(--line2)}
.stage.board .zone:last-child{border-right:none}
.zone.now{background:var(--surface2)}
.zone.big{width:min(780px,100%);border-right:none;background:transparent;padding:14px 26px 0}
.zhead{flex:0 0 auto;display:flex;align-items:center;gap:11px;padding:18px 20px 12px}
.zone.big .zhead{padding:26px 4px 16px}
.zaccent{width:4px;height:22px;border-radius:3px;background:var(--line2)}
.zone.now .zaccent,.zone.big .zaccent{background:var(--acc)}
.zone.big .zaccent{height:34px;width:5px}
.ztitle{font-size:19px;font-weight:800;letter-spacing:.01em;font-family:var(--mono)}
.zone.big .ztitle{font-size:34px;letter-spacing:-.01em}
.zkr{font-size:13px;color:var(--faint);font-weight:600}
.zone.big .zkr{font-size:16px}
.zbadge{display:inline-flex;align-items:center;justify-content:center;min-width:24px;height:22px;padding:0 7px;font-size:12.5px;font-weight:700;color:var(--mut);border:1px solid var(--line2);border-radius:20px;font-variant-numeric:tabular-nums}
.zone.now .zbadge{border-color:var(--acc);color:var(--acc)}
.zone.big .zbadge{font-size:14px;height:26px}
.clearbtn{margin-left:auto;display:inline-flex;align-items:center;gap:6px;font-size:12.5px;font-weight:700;color:var(--mut);padding:6px 11px;border-radius:8px;border:1px solid var(--line2)}
.clearbtn:hover{color:var(--bad);border-color:var(--bad)}
.clearbtn .ic{width:15px;height:15px}

.addrow{flex:0 0 auto;display:flex;align-items:center;gap:8px;padding:0 18px 12px}
.zone.big .addrow{padding:0 4px 18px}
.addrow input{flex:1;background:var(--surface2);border:1px solid var(--line);color:var(--fg);font-size:16px;font-weight:500;padding:12px 14px;border-radius:10px}
.zone.now .addrow input{background:var(--surface)}
.zone.big .addrow input{font-size:18px;padding:15px 17px}
.addrow input::placeholder{color:var(--faint)}
.addrow input:focus{border-color:var(--acc)}
.addbtn{flex:0 0 auto;width:44px;height:44px;border-radius:10px;background:var(--acc);color:#fff;display:inline-flex;align-items:center;justify-content:center}
.zone.big .addbtn{width:50px;height:50px}
.addbtn:hover{background:var(--acc-deep)}
.addbtn .ic{width:20px;height:20px;stroke-width:2.4}

.list{flex:1;overflow-y:auto;padding:2px 10px 20px;display:flex;flex-direction:column;gap:1px}
.zone.big .list{padding:2px 0 60px}
.empty{color:var(--faint);font-size:15px;font-weight:500;padding:14px 10px}
.zone.big .empty{font-size:17px}
.item{display:flex;align-items:center;gap:12px;padding:9px 8px;border-radius:9px}
.item:hover{background:var(--surface2)}
.zone.now .item:hover{background:var(--surface)}
.zone.big .item{padding:12px 8px}
.check{flex:0 0 auto;width:23px;height:23px;border-radius:7px;border:2px solid var(--line2);display:inline-flex;align-items:center;justify-content:center;color:transparent}
.check:hover{border-color:var(--acc)}
.item.done .check{background:var(--acc);border-color:var(--acc);color:#fff}
.check .ic{width:14px;height:14px;stroke-width:3}
.zone.big .check{width:26px;height:26px}
.text{flex:1;min-width:0;font-size:17px;font-weight:500;line-height:1.4;word-break:break-word;padding:2px 2px;border-radius:4px}
.zone.big .text{font-size:19px}
.item.done .text{color:var(--faint);text-decoration:line-through;text-decoration-thickness:1.5px}
.text[contenteditable="true"]{outline:none;box-shadow:inset 0 -2px 0 var(--acc);cursor:text}
.del{flex:0 0 auto;width:30px;height:30px;border-radius:8px;color:var(--faint);display:inline-flex;align-items:center;justify-content:center;opacity:0}
.item:hover .del,.item:focus-within .del{opacity:1}
.del:hover{color:var(--bad)}
.del .ic{width:16px;height:16px}
.list::-webkit-scrollbar{width:9px}
.list::-webkit-scrollbar-thumb{background:var(--line2);border-radius:6px;border:2px solid var(--surface)}

@media(max-width:900px){
  body{overflow:auto}
  .appbar{flex-wrap:wrap;height:auto;padding:12px 14px;gap:10px}
  .tabs{order:3;width:100%;margin-left:0;overflow-x:auto}
  .stage.board{grid-template-columns:1fr;overflow:visible}
  .zone{border-right:none;border-bottom:1px solid var(--line2);min-height:300px}
  .zone.big{padding:10px 14px 0}
}
</style>
</head>
<body>
<header class="appbar">
  <a class="back" href="/">‹ 포털</a>
  <span class="title">잡기장</span>
  <nav class="tabs" id="tabs"></nav>
  <div class="spacer"></div>
  <span class="sync off" id="sync"><span class="dot"></span><span id="syncl">로컬</span></span>
  <button class="themebtn" id="tg"><svg class="ic" viewBox="0 0 24 24"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M2 12h2M20 12h2M5 5l1.5 1.5M17.5 17.5 19 19M19 5l-1.5 1.5M6.5 17.5 5 19"/></svg><span id="tgl">라이트</span></button>
</header>
<div class="stage board" id="stage"></div>

<script>
const SUPA='https://ovnabmmofgujgefuamzn.supabase.co';
const ANON='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im92bmFibW1vZmd1amdlZnVhbXpuIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ5NzY1NDMsImV4cCI6MjA5MDU1MjU0M30.IvgT7eE_PfxRplHVkf2kXGw_sqGy07WNausqit3qskk';
const KV='jot';
function rpc(fn,body){return fetch(SUPA+'/rest/v1/rpc/'+fn,{method:'POST',headers:{apikey:ANON,Authorization:'Bearer '+ANON,'Content-Type':'application/json'},body:JSON.stringify(body)}).then(function(r){return r.ok?r.json():null;}).catch(function(){return null;});}

const ZONES=[
  {key:'IDEA',kr:'아이디어',ph:'떠오른 생각 캡처 후 Enter'},
  {key:'WORK',kr:'일',ph:'업무 할 일 추가 후 Enter'},
  {key:'NOW',kr:'지금',ph:'지금 할 일 적고 Enter — 끝나면 비우기',session:true},
  {key:'TODO',kr:'일상',ph:'일상 할 일 추가 후 Enter'}
];
const KEYS=ZONES.map(function(z){return z.key;});

const LKEY='jot_v1';
function blank(){return {items:{IDEA:[],WORK:[],NOW:[],TODO:[]},view:'all',theme:'dark'};}
function normalize(s){
  var o=blank(); if(!s||typeof s!=='object')return o;
  o.view=(s.view&&(s.view==='all'||KEYS.indexOf(s.view)>=0))?s.view:'all';
  o.theme=s.theme==='light'?'light':'dark';
  var it=s.items||{}; KEYS.forEach(function(k){ o.items[k]=Array.isArray(it[k])?it[k].filter(function(x){return x&&typeof x.text==='string';}):[]; });
  return o;
}
var state=normalize(function(){try{return JSON.parse(localStorage.getItem(LKEY));}catch(e){return null;}}());

var uidC=0;
function uid(){uidC++;return 'i'+Date.now().toString(36)+'-'+uidC;}

function esc(t){return String(t).replace(/[&<>"]/g,function(c){return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c];});}
function IC(n){var p={
  plus:'<path d="M12 5v14M5 12h14"/>',
  check:'<path d="M4 12l5 5L20 6"/>',
  x:'<path d="M6 6l12 12M18 6L6 18"/>',
  trash:'<path d="M4 7h16M9 7V5a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2M7 7l1 13h8l1-13"/>'
}[n]||''; return '<svg class="ic" viewBox="0 0 24 24">'+p+'</svg>';}

/* ---- persistence ---- */
function saveLocal(){try{localStorage.setItem(LKEY,JSON.stringify(state));}catch(e){}}
var saveT=null, syncOK=false;
function setSync(ok){syncOK=ok;var el=document.getElementById('sync');el.className='sync '+(ok?'ok':'off');document.getElementById('syncl').textContent=ok?'동기화됨':'로컬';}
function persist(){
  saveLocal();
  clearTimeout(saveT);
  saveT=setTimeout(function(){ rpc('kv_set',{p_k:KV,p_v:state}).then(function(r){ if(r!==null)setSync(true); }); },500);
}
function loadRemote(){
  return rpc('kv_get',{p_k:KV}).then(function(r){
    if(r&&typeof r==='object'&&r.items){ state=normalize(r); saveLocal(); setSync(true); render(); }
    else if(r!==null){ setSync(true); }
  });
}

/* ---- ops ---- */
function add(k,text){text=(text||'').trim(); if(!text)return; state.items[k].push({id:uid(),text:text,done:false}); persist();}
function toggle(k,id){var a=state.items[k];for(var i=0;i<a.length;i++)if(a[i].id===id){a[i].done=!a[i].done;break;} persist();}
function del(k,id){state.items[k]=state.items[k].filter(function(x){return x.id!==id;}); persist();}
function editText(k,id,text){var a=state.items[k];for(var i=0;i<a.length;i++)if(a[i].id===id){if(text.trim()){a[i].text=text.trim();}else{state.items[k]=a.filter(function(x){return x.id!==id;});}break;} persist();}
function clearZone(k){ if(!state.items[k].length)return; if(confirm('“'+zoneOf(k).key+'” 목록을 비울까요?')){ state.items[k]=[]; persist(); render(); } }
function zoneOf(k){return ZONES.find(function(z){return z.key===k;});}

/* ---- render ---- */
function panelHTML(z,big){
  var items=state.items[z.key]||[]; var remain=items.filter(function(i){return !i.done;}).length;
  var head='<div class="zhead"><span class="zaccent"></span><span class="ztitle">'+z.key+'</span><span class="zkr">'+z.kr+'</span><span class="zbadge">'+remain+'</span>'+(z.session?'<button class="clearbtn" data-clear="'+z.key+'">'+IC('trash')+' 비우기</button>':'')+'</div>';
  var addr='<div class="addrow"><input data-add="'+z.key+'" placeholder="'+z.ph+'"><button class="addbtn" data-addbtn="'+z.key+'" aria-label="추가">'+IC('plus')+'</button></div>';
  var list='<div class="list" data-list="'+z.key+'">'+(items.length?items.map(function(it){return itemHTML(z.key,it);}).join(''):'<div class="empty">아직 없음</div>')+'</div>';
  return '<section class="zone'+(z.session?' now':'')+(big?' big':'')+'" data-zone="'+z.key+'">'+head+addr+list+'</section>';
}
function itemHTML(k,it){
  return '<div class="item'+(it.done?' done':'')+'" data-id="'+it.id+'" data-k="'+k+'"><button class="check" data-check aria-label="완료">'+IC('check')+'</button><span class="text" data-text>'+esc(it.text)+'</span><button class="del" data-del aria-label="삭제">'+IC('x')+'</button></div>';
}
var stage=document.getElementById('stage');
function renderTabs(){
  var t=[{key:'all',kr:'전체'}].concat(ZONES);
  document.getElementById('tabs').innerHTML=t.map(function(z){
    var on=state.view===z.key?' on':''; var all=z.key==='all'?' all':'';
    var cnt=z.key==='all'?'':'<span class="cnt">'+(state.items[z.key].filter(function(i){return !i.done;}).length||'')+'</span>';
    var lbl=z.key==='all'?'전체':z.key;
    return '<button class="tab'+all+on+'" data-tab="'+z.key+'">'+lbl+cnt+'</button>';
  }).join('');
}
function render(){
  document.documentElement.setAttribute('data-theme',state.theme);
  document.getElementById('tgl').textContent=state.theme==='dark'?'라이트':'다크';
  renderTabs();
  if(state.view==='all'){ stage.className='stage board'; stage.innerHTML=ZONES.map(function(z){return panelHTML(z,false);}).join(''); }
  else { stage.className='stage focus'; stage.innerHTML=panelHTML(zoneOf(state.view),true); }
}

/* ---- events (delegation) ---- */
document.getElementById('tabs').addEventListener('click',function(e){
  var b=e.target.closest('[data-tab]'); if(!b)return; state.view=b.getAttribute('data-tab'); saveLocal(); render();
  var inp=stage.querySelector('.addrow input'); if(inp&&state.view!=='all')inp.focus();
});
document.getElementById('tg').addEventListener('click',function(){ state.theme=state.theme==='dark'?'light':'dark'; persist(); render(); });

stage.addEventListener('click',function(e){
  var addb=e.target.closest('[data-addbtn]');
  if(addb){ var k=addb.getAttribute('data-addbtn'); var inp=stage.querySelector('input[data-add="'+k+'"]'); if(inp){add(k,inp.value);inp.value='';render();var ni=stage.querySelector('input[data-add="'+k+'"]');if(ni)ni.focus();} return; }
  var clr=e.target.closest('[data-clear]'); if(clr){ clearZone(clr.getAttribute('data-clear')); return; }
  var it=e.target.closest('.item'); if(!it)return; var k=it.getAttribute('data-k'), id=it.getAttribute('data-id');
  if(e.target.closest('[data-check]')){ toggle(k,id); render(); return; }
  if(e.target.closest('[data-del]')){ del(k,id); render(); return; }
});
stage.addEventListener('keydown',function(e){
  if(e.key==='Enter'){
    var inp=e.target.closest('input[data-add]');
    if(inp){ e.preventDefault(); var k=inp.getAttribute('data-add'); add(k,inp.value); inp.value=''; render(); var ni=stage.querySelector('input[data-add="'+k+'"]'); if(ni)ni.focus(); return; }
    var tx=e.target.closest('.text[contenteditable="true"]'); if(tx){ e.preventDefault(); tx.blur(); }
  }
});
stage.addEventListener('dblclick',function(e){
  var tx=e.target.closest('[data-text]'); if(!tx)return; tx.setAttribute('contenteditable','true'); tx.focus();
  var r=document.createRange(); r.selectNodeContents(tx); var s=getSelection(); s.removeAllRanges(); s.addRange(r);
});
stage.addEventListener('blur',function(e){
  var tx=e.target.closest&&e.target.closest('[data-text][contenteditable="true"]'); if(!tx)return;
  tx.removeAttribute('contenteditable'); var it=tx.closest('.item'); editText(it.getAttribute('data-k'),it.getAttribute('data-id'),tx.textContent); render();
},true);

/* ---- init ---- */
render();
loadRemote();
</script>
</body>
</html>
